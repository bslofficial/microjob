<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - MicroJobs BD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f1f5f9; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen pb-12">

    <header class="bg-slate-900 text-white p-5 shadow-xl sticky top-0 z-50 flex justify-between items-center max-w-lg mx-auto rounded-b-3xl">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 p-2.5 rounded-2xl shadow-md"><i class="fas fa-user-shield text-xl"></i></div>
            <div>
                <h1 class="font-bold text-base leading-tight">Admin Dashboard</h1>
                <p class="text-[10px] text-gray-400 mt-0.5" id="admin-email">Loading...</p>
            </div>
        </div>
        <button onclick="window.handleLogout()" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-xl text-xs font-bold transition active:scale-95 shadow-md shadow-red-500/20">
            Logout
        </button>
    </header>

    <main class="max-w-md mx-auto p-4 mt-4 space-y-6">
        
        <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-gray-100">
            <h2 class="font-bold text-slate-800 flex items-center gap-2 mb-5 text-sm uppercase tracking-wider">
                <span class="w-2 h-5 bg-blue-600 rounded-full"></span> <i class="fas fa-plus-circle text-blue-600"></i> Post New Job
            </h2>
            
            <div class="space-y-3.5">
                <input id="job-title" type="text" placeholder="কাজের শিরোনাম" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-200 outline-none text-sm focus:border-blue-500 transition">
                <input id="job-budget" type="number" placeholder="পুরস্কারের পরিমাণ (৳)" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-200 outline-none text-sm focus:border-blue-500 transition">
                <input id="job-url" type="url" placeholder="কাজের লিঙ্ক (URL)" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-200 outline-none text-sm focus:border-blue-500 transition">
                <input id="job-duration" type="number" placeholder="টাইমার সেকেন্ড (যেমন: ৬০)" class="w-full p-4 bg-gray-50 rounded-2xl border border-gray-200 outline-none text-sm focus:border-blue-500 transition">
                
                <button id="publish-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-bold transition shadow-lg shadow-blue-500/20 mt-2 active:scale-[0.98]">
                    পাবলিশ জব
                </button>
            </div>
        </div>

        <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-gray-100">
            <h2 class="font-bold text-slate-800 flex items-center gap-2 mb-4 text-sm uppercase tracking-wider">
                <span class="w-2 h-5 bg-red-500 rounded-full"></span> <i class="fas fa-tasks text-red-500"></i> Active Jobs (<span id="job-count">0</span>)
            </h2>
            <div id="admin-job-list" class="space-y-3 divide-y divide-gray-50">
                <p class="text-center text-xs text-gray-400 py-4">কোনো কাজ খুঁজে পাওয়া যায়নি।</p>
            </div>
        </div>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyANRqR887AfhoW4GxInZHH9J3YYWCfnjs0",
            authDomain: "microjobs-b9d90.firebaseapp.com",
            projectId: "microjobs-b9d90",
            storageBucket: "microjobs-b9d90.firebasestorage.app",
            messagingSenderId: "1006928193385",
            appId: "1:1006928193385:web:d4b5cc1911abda6ff53ff8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // লগআউট ফাংশন
        window.handleLogout = () => signOut(auth).then(() => location.href = "login.html");

        // জব ডিলিট করার গ্লোবাল ফাংশন
        window.deleteJob = async (id) => {
            if(confirm("আপনি কি নিশ্চিতভাবে এই জবটি ডিলিট করতে চান?")) {
                try {
                    await deleteDoc(doc(db, "jobs", id));
                    alert("জবটি সফলভাবে ডিলিট করা হয়েছে!");
                } catch (e) {
                    alert("ডিলিট করা যায়নি!");
                }
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                // চেক করুন এটা অ্যাডমিন কিনা (অথবা সরাসরি ইমেইল দেখাবে)
                document.getElementById('admin-email').innerText = user.email;

                // জব পাবলিশ লজিক
                document.getElementById('publish-btn').onclick = async () => {
                    const title = document.getElementById('job-title').value.trim();
                    const budget = document.getElementById('job-budget').value.trim();
                    const url = document.getElementById('job-url').value.trim();
                    const duration = document.getElementById('job-duration').value.trim();

                    if(!title || !budget || !url) return alert("দয়া করে সবগুলো ঘর পূরণ করুন!");

                    try {
                        await addDoc(collection(db, "jobs"), {
                            title: title,
                            budget: Number(budget),
                            url: url,
                            duration: Number(duration) || 60, // কিছু না দিলে অটো ৬০ সেকেন্ড হবে
                            status: "active",
                            createdAt: serverTimestamp()
                        });

                        alert("জব সফলভাবে পাবলিশ হয়েছে!");
                        // ইনপুট ফিল্ড ক্লিয়ার করা
                        document.getElementById('job-title').value = "";
                        document.getElementById('job-budget').value = "";
                        document.getElementById('job-url').value = "";
                        document.getElementById('job-duration').value = "";
                    } catch (e) {
                        alert("জব পাবলিশ করতে সমস্যা হয়েছে!");
                    }
                };

                // ড্যাশবোর্ডে সব জব লাইভ লোড করা ও ডিলিট অপশন দেওয়া
                onSnapshot(collection(db, "jobs"), (snap) => {
                    const container = document.getElementById('admin-job-list');
                    document.getElementById('job-count').innerText = snap.size;
                    container.innerHTML = "";
                    
                    if(snap.empty) {
                        container.innerHTML = `<p class="text-center text-xs text-gray-400 py-4">কোনো কাজ খুঁজে পাওয়া যায়নি।</p>`;
                        return;
                    }

                    snap.forEach(d => {
                        const job = d.data();
                        container.innerHTML += `
                            <div class="flex justify-between items-center py-3.5 first:pt-0">
                                <div class="max-w-[70%]">
                                    <h4 class="font-bold text-gray-800 text-sm truncate">${job.title}</h4>
                                    <p class="text-xs text-gray-500 mt-0.5">টাকা: ৳${job.budget} | সময়: ${job.duration || 60}সেকেণ্ড</p>
                                </div>
                                <button onclick="window.deleteJob('${d.id}')" class="bg-red-50 hover:bg-red-100 text-red-500 w-9 h-9 rounded-xl flex items-center justify-center transition active:scale-90">
                                    <i class="fas fa-trash-alt text-sm"></i>
                                </button>
                            </div>`;
                    });
                });

            } else {
                location.href = "login.html";
            }
        });
    </script>
</body>
</html>
