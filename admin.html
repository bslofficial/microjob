<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - MicroJobs BD Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <nav class="bg-gray-900 p-4 text-white font-bold text-center shadow-lg sticky top-0 z-50">
        ADMIN CONTROL PANEL - MANAGEMENT
    </nav>

    <div class="max-w-5xl mx-auto p-4 md:p-8">
        
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 mb-10">
            <h2 class="text-xl font-bold mb-6 text-blue-800 border-b pb-2 flex items-center gap-2">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                নতুন কাজ পাবলিশ করুন
            </h2>
            
            <div class="grid grid-cols-1 gap-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input id="adm-title" type="text" placeholder="কাজের টাইটেল (যেমন: Subscribe My Channel)" class="border p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-400">
                    
                    <select id="adm-category" class="border p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-400 bg-white">
                        <option value="">ক্যাটাগরি সিলেক্ট করুন</option>
                        <option value="Youtube">YouTube</option>
                        <option value="Facebook">Facebook</option>
                        <option value="App">App Install</option>
                        <option value="Others">অন্যান্য</option>
                    </select>
                </div>

                <textarea id="adm-desc" placeholder="কাজের নিয়মাবলী বা ডেসক্রিপশন এখানে লিখুন..." class="border p-3 rounded-xl h-32 outline-none focus:ring-2 focus:ring-blue-400 w-full"></textarea>
                
                <div class="flex gap-4">
                    <input id="adm-budget" type="number" placeholder="বাজেট (৳)" class="border p-3 rounded-xl w-32 outline-none focus:ring-2 focus:ring-blue-400 font-bold text-blue-600">
                    <button id="adm-post-btn" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold text-lg hover:bg-blue-700 transition shadow-md active:scale-95">পাবলিশ করুন</button>
                </div>
            </div>
        </div>

        <div class="grid md:grid-cols-2 gap-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                <h2 class="font-bold text-lg mb-5 text-red-600 flex items-center gap-2 border-b pb-2">
                    <span class="w-3 h-3 bg-red-600 rounded-full animate-pulse"></span> পেন্ডিং প্রুফ
                </h2>
                <div id="pending-proofs" class="space-y-4">
                    <p class="text-gray-400 italic text-sm">লোড হচ্ছে...</p>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                <h2 class="font-bold text-lg mb-5 text-green-600 border-b pb-2">উইথড্র রিকোয়েস্ট</h2>
                <div id="pending-withdraws" class="space-y-4">
                    <p class="text-gray-400 italic text-sm">লোড হচ্ছে...</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
