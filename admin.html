<!DOCTYPE html>
<html lang="bn">
<head>
    <title>Admin Panel - MicroJobs</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
    <h1 class="text-2xl font-bold mb-6">অ্যাডমিন প্যানেল</h1>
    
    <div class="bg-white p-6 rounded-xl shadow mb-8">
        <h2 class="font-bold mb-4">নতুন কাজ যোগ করুন</h2>
        <input id="j-title" placeholder="কাজের শিরোনাম" class="w-full p-2 border mb-2">
        <input id="j-budget" placeholder="বাজেট (৳)" class="w-full p-2 border mb-2">
        <button onclick="publishJob()" class="bg-blue-600 text-white px-4 py-2 rounded">পাবলিশ করুন</button>
    </div>

    <div class="bg-white p-6 rounded-xl shadow">
        <h2 class="font-bold mb-4">পেমেন্ট রিকোয়েস্ট</h2>
        <div id="admin-withdraw-list"></div>
    </div>

    <script src="admin.js" type="module"></script>
</body>
</html>
