<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5">
    <div class="max-w-md mx-auto">
        <h1 class="text-xl font-bold mb-5 text-center text-red-600">Admin Control Panel</h1>
        <div class="bg-white p-5 rounded-2xl shadow-md mb-5">
            <h2 class="font-bold mb-3">নতুন কাজ পাবলিশ করুন</h2>
            <input id="adm-title" type="text" placeholder="Title" class="w-full border p-2 rounded mb-2">
            <input id="adm-url" type="url" placeholder="URL" class="w-full border p-2 rounded mb-2">
            <input id="adm-budget" type="number" placeholder="Budget" class="w-full border p-2 rounded mb-4">
            <button id="adm-post-btn" class="w-full bg-red-600 text-white py-2 rounded font-bold">পাবলিশ করুন</button>
        </div>
        <div id="pending-proofs" class="space-y-3">
            <h3 class="font-bold text-gray-500">পেন্ডিং প্রুফ চেক করুন</h3>
        </div>
    </div>
    <script type="module" src="admin.js"></script>
</body>
</html>
