<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Admin - Approval Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-200">
    <nav class="bg-gray-800 p-4 text-white font-bold text-center">ADMIN PANEL - MANAGEMENT</nav>

    <div class="max-w-5xl mx-auto p-6">
        <div class="bg-white p-6 rounded-lg shadow mb-8">
            <h2 class="text-xl font-bold mb-4 border-b">নতুন কাজ পোস্ট করুন</h2>
            <div class="flex gap-4">
                <input id="adm-title" type="text" placeholder="কাজের নাম" class="border p-2 flex-1">
                <input id="adm-budget" type="number" placeholder="৳" class="border p-2 w-24">
                <button id="adm-post-btn" class="bg-blue-600 text-white px-6 py-2 rounded">পাবলিশ</button>
            </div>
        </div>

        <div class="grid md:grid-cols-2 gap-8">
            <div>
                <h2 class="font-bold text-lg mb-4 text-red-600">পেন্ডিং প্রুফ (Pending Proofs)</h2>
                <div id="pending-proofs" class="space-y-4"></div>
            </div>
            <div>
                <h2 class="font-bold text-lg mb-4 text-green-600">উইথড্র রিকোয়েস্ট (Withdrawal)</h2>
                <div id="pending-withdraws" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
