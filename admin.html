<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Post New Job</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

    <nav class="bg-gray-800 p-4 text-white">
        <div class="max-w-4xl mx-auto flex justify-between">
            <h1 class="font-bold">Admin Control</h1>
            <a href="index.html" class="text-gray-300 hover:text-white">← Back to Dashboard</a>
        </div>
    </nav>

    <main class="p-10">
        <div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-lg">
            <h2 class="text-2xl font-bold mb-6 text-red-600 border-b pb-2">Post a New Job</h2>
            <form id="job-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold mb-1">Job Title</label>
                    <input id="job-title" type="text" placeholder="e.g. Subscribe to YouTube" class="w-full border p-2.5 rounded-lg outline-none focus:ring-2 focus:ring-red-500" required>
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1">Budget (BDT)</label>
                    <input id="job-budget" type="number" placeholder="৳ 10" class="w-full border p-2.5 rounded-lg outline-none focus:ring-2 focus:ring-red-500" required>
                </div>
                <button type="submit" id="submit-btn" class="bg-green-600 text-white w-full py-3 rounded-lg font-bold hover:bg-green-700 transition">Publish Job</button>
            </form>
        </div>
    </main>

    <script type="module" src="admin.js"></script>
</body>
</html>
