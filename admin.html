<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - MicroJobs BD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 min-h-screen pb-10">

    <nav class="bg-red-600 text-white p-4 shadow-md sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="font-bold text-lg"><i class="fas fa-user-shield"></i> Admin Control</h1>
            <button onclick="location.reload()" class="text-sm bg-red-700 px-3 py-1 rounded-lg hover:bg-red-800 transition">রিফ্রেশ</button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 space-y-6">
        
        <section class="bg-white p-6 rounded-3xl shadow-sm border border-blue-100">
            <h2 class="font-bold text-blue-600 mb-4 flex items-center gap-2">
                <i class="fas fa-plus-circle"></i> নতুন জব পাবলিশ করুন
            </h2>
            <div class="grid grid-cols-1 gap-4">
                <input id="adm-title" type="text" placeholder="কাজের টাইটেল" class="p-3 bg-gray-50 border rounded-xl outline-none focus:border-blue-400">
                
                <textarea id="adm-desc" rows="3" placeholder="কাজের বিস্তারিত বর্ণনা (Description)" class="p-3 bg-gray-50 border rounded-xl outline-none focus:border-blue-400"></textarea>
                
                <input id="adm-url" type="url" placeholder="কাজের লিঙ্ক (URL)" class="p-3 bg-gray-50 border rounded-xl outline-none focus:border-blue-400">
                <input id="adm-budget" type="number" placeholder="ইউজার কত পাবে? (৳)" class="p-3 bg-gray-50 border rounded-xl outline-none focus:border-blue-400">
                
                <button onclick="window.adminPostJob()" class="bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 shadow-md transition-all">পাবলিশ করুন</button>
            </div>
        </section>

        <section class="bg-white p-6 rounded-3xl shadow-sm border border-red-100">
            <h2 class="font-bold text-red-600 mb-4 flex items-center gap-2">
                <i class="fas fa-tasks"></i> বর্তমান জব লিস্ট ও ডিলিট
            </h2>
            <div id="admin-job-list" class="space-y-3">
                <p class="text-gray-400 text-sm text-center py-4">জব লোড হচ্ছে...</p>
            </div>
        </section>

        <section class="bg-white p-6 rounded-3xl shadow-sm border border-green-100">
            <h2 class="font-bold text-green-600 mb-4 flex items-center gap-2">
                <i class="fas fa-money-check-alt"></i> পেন্ডিং ডিপোজিট
            </h2>
            <div id="deposit-list" class="space-y-3">
                <p class="text-gray-400 text-sm text-center py-4">কোনো পেন্ডিং ডিপোজিট নেই</p>
            </div>
        </section>

        <section class="bg-white p-6 rounded-3xl shadow-sm border border-orange-100">
            <h2 class="font-bold text-orange-600 mb-4 flex items-center gap-2">
                <i class="fas fa-wallet"></i> উইথড্র রিকোয়েস্ট
            </h2>
            <div id="withdraw-list" class="space-y-3">
                <p class="text-gray-400 text-sm text-center py-4">কোনো উইথড্র রিকোয়েস্ট নেই</p>
            </div>
        </section>

        <section class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
            <h2 class="font-bold text-gray-700 mb-4 flex items-center gap-2">
                <i class="fas fa-users"></i> ইউজার ম্যানেজমেন্ট
            </h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead>
                        <tr class="border-b bg-gray-50">
                            <th class="py-3 px-2">ইমেইল</th>
                            <th class="py-3 px-2">ব্যালেন্স</th>
                            <th class="py-3 px-2">স্ট্যাটাস</th>
                            <th class="py-3 px-2">অ্যাকশন</th>
                        </tr>
                    </thead>
                    <tbody id="user-table-body">
                        </tbody>
                </table>
            </div>
        </section>

    </main>

    <script type="module" src="admin.js"></script>
</body>
</html>
