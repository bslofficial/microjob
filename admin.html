<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - MicroJobs</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-4">
    <div class="max-w-md mx-auto">
        <div class="bg-white p-6 rounded-3xl shadow-xl border border-gray-100">
            <h2 class="text-xl font-bold text-blue-700 mb-6 flex items-center gap-2">
                <span class="bg-blue-100 p-2 rounded-lg">🚀</span> নতুন কাজ পাবলিশ করুন
            </h2>
            
            <div class="space-y-4">
                <input id="title" type="text" placeholder="কাজের নাম (যেমন: Facebook Follow)" class="w-full p-4 bg-gray-50 rounded-2xl outline-none focus:ring-2 focus:ring-blue-400 border-none">
                
                <textarea id="desc" placeholder="কাজের নিয়মাবলি..." class="w-full p-4 bg-gray-50 rounded-2xl outline-none focus:ring-2 focus:ring-blue-400 border-none h-24"></textarea>
                
                <div class="flex gap-2">
                    <input id="budget" type="number" placeholder="টাকা (৳)" class="w-1/2 p-4 bg-gray-50 rounded-2xl outline-none border-none">
                    <select id="cat" class="w-1/2 p-4 bg-gray-50 rounded-2xl outline-none border-none text-gray-500">
                        <option value="Youtube">YouTube</option>
                        <option value="Facebook">Facebook</option>
                        <option value="Others">Others</option>
                    </select>
                </div>
                
                <button id="add-btn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-200 active:scale-95 transition-all">পাবলিশ করুন</button>
            </div>
        </div>

        <div class="mt-8">
            <h3 class="font-bold text-gray-700 mb-4 flex items-center gap-2">
                <span class="w-2 h-2 bg-red-500 rounded-full"></span> পেন্ডিং আবেদনসমূহ
            </h3>
            <div id="admin-pending-list" class="space-y-3">
                <p class="text-center text-gray-400 text-sm py-10 bg-white rounded-3xl">কোনো আবেদন নেই</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyANRqR887AfhoW4GxInZHH9J3YYWCfnjs0",
            authDomain: "microjobs-b9d90.firebaseapp.com",
            projectId: "microjobs-b9d90",
            storageBucket: "microjobs-b9d90.firebasestorage.app",
            messagingSenderId: "1006928193385",
            appId: "1:1006928193385:web:d4b5cc1911abda6ff53ff8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        document.getElementById('add-btn').onclick = async () => {
            const title = document.getElementById('title').value;
            const desc = document.getElementById('desc').value;
            const budget = parseFloat(document.getElementById('budget').value);
            const category = document.getElementById('cat').value;

            if(!title || !budget) return alert("তথ্য অসম্পূর্ণ!");

            try {
                await addDoc(collection(db, "jobs"), {
                    title, description: desc, budget, category, createdAt: serverTimestamp()
                });
                alert("কাজটি সফলভাবে লাইভ হয়েছে!");
                location.reload();
            } catch (e) {
                alert("এরর: " + e.message);
            }
        };
    </script>
</body>
</html>
