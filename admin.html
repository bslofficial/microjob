<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MicroJobs Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 pb-10">

    <div class="max-w-md mx-auto p-4 space-y-6">
        
        <div class="bg-white p-6 rounded-3xl shadow-xl border border-blue-50">
            <h2 class="text-xl font-bold text-blue-800 mb-5 flex items-center gap-2">
                <span class="text-2xl">📢</span> নতুন কাজ পোস্ট করুন
            </h2>
            
            <div class="space-y-4">
                <input id="adm-title" type="text" placeholder="কাজের নাম (যেমন: Subscribe My Channel)" class="w-full p-4 bg-gray-50 rounded-2xl outline-none border border-transparent focus:border-blue-400">
                
                <select id="adm-category" class="w-full p-4 bg-gray-50 rounded-2xl outline-none border border-transparent focus:border-blue-400 text-gray-500">
                    <option value="Youtube">YouTube</option>
                    <option value="Facebook">Facebook</option>
                    <option value="Others">Others</option>
                </select>

                <textarea id="adm-desc" placeholder="কাজের নিয়মাবলি বিস্তারিত লিখুন..." class="w-full p-4 bg-gray-50 rounded-2xl outline-none border border-transparent focus:border-blue-400 h-24"></textarea>
                
                <input id="adm-budget" type="number" placeholder="বাজেট (৳)" class="w-full p-4 bg-gray-50 rounded-2xl outline-none border border-transparent focus:border-blue-400">
                
                <button id="adm-post-btn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-100 active:scale-95 transition-all">পাবলিশ করুন</button>
            </div>
        </div>

        <div>
            <h3 class="font-bold text-gray-800 mb-4 flex items-center gap-2">
                <span class="w-3 h-3 bg-red-500 rounded-full animate-pulse"></span> পেন্ডিং প্রুফসমূহ
            </h3>
            <div id="pending-proofs" class="space-y-4">
                <p class="text-center text-gray-400 py-10 bg-white rounded-3xl">লোড হচ্ছে...</p>
            </div>
        </div>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
