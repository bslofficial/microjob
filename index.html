<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MicroJobs BD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-tab { color: #1e40af; font-weight: bold; }
    </style>
</head>
<body class="bg-gray-100 pb-20">

    <nav class="bg-blue-800 text-white p-4 shadow-md sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="font-bold text-lg">MicroJobs BD</h1>
            <div id="auth-info" class="hidden flex items-center gap-3">
                <button id="logout-btn" class="bg-red-500 px-3 py-1 rounded text-xs font-bold">Logout</button>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4">
        <div id="auth-view" class="bg-white p-6 rounded-2xl shadow-lg mt-10 max-w-sm mx-auto">
            <h2 class="text-xl font-bold mb-4 text-center">লগইন করুন</h2>
            <input id="email" type="email" placeholder="ইমেইল" class="w-full border p-3 rounded-xl mb-3 outline-none focus:ring-2 focus:ring-blue-500">
            <input id="password" type="password" placeholder="পাসওয়ার্ড" class="w-full border p-3 rounded-xl mb-4 outline-none focus:ring-2 focus:ring-blue-500">
            <button id="login-btn" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold mb-2">Login</button>
            <button id="signup-btn" class="w-full text-blue-600 font-bold py-2">Sign Up</button>
        </div>

        <div id="main-view" class="hidden">
            
            <div id="home-tab">
                <div class="bg-gradient-to-r from-blue-700 to-blue-500 p-6 rounded-2xl text-white shadow-lg mb-6">
                    <p class="opacity-80 text-sm">বর্তমান ব্যালেন্স</p>
                    <h2 class="text-4xl font-bold mt-1">৳<span id="balance">0.00</span></h2>
                </div>

                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-bold text-gray-800">উপলব্ধ কাজসমূহ</h2>
                    <select onchange="filterJobs(this.value)" class="text-xs border p-1 rounded bg-white">
                        <option value="all">সব ক্যাটাগরি</option>
                        <option value="Youtube">YouTube</option>
                        <option value="Facebook">Facebook</option>
                        <option value="App">App Install</option>
                    </select>
                </div>
                <div id="job-list" class="grid gap-4"></div>
            </div>

            <div id="profile-tab" class="hidden space-y-4">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                    <h2 class="text-xl font-bold mb-4 text-blue-800">আপনার প্রোফাইল</h2>
                    <p class="text-gray-600">ইমেইল: <span id="user-email" class="font-bold"></span></p>
                    <p class="text-gray-600 mt-2">মোট আয়: <span class="text-green-600 font-bold">৳<span id="p-balance">0.00</span></span></p>
                </div>
            </div>

            <div id="wallet-tab" class="hidden space-y-4">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                    <h2 class="text-xl font-bold mb-4 text-green-700">টাকা উত্তোলন (Withdraw)</h2>
                    <input id="w-amount" type="number" placeholder="পরিমাণ (৳)" class="w-full border p-3 rounded-xl mb-3 outline-none">
                    <input id="w-number" type="text" placeholder="বিকাশ/নগদ নম্বর" class="w-full border p-3 rounded-xl mb-4 outline-none">
                    <button id="withdraw-btn" class="w-full bg-orange-500 text-white py-3 rounded-xl font-bold">রিকোয়েস্ট পাঠান</button>
                    <p class="text-[10px] text-gray-400 mt-3 text-center">* নূন্যতম উইথড্র ৫০ টাকা।</p>
                </div>
            </div>

        </div>
    </main>

    <div id="bottom-nav" class="hidden fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around py-3 shadow-lg z-50">
        <button onclick="switchTab('home')" id="btn-home" class="flex flex-col items-center active-tab">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
            <span class="text-[10px]">Home</span>
        </button>
        <button onclick="switchTab('profile')" id="btn-profile" class="flex flex-col items-center text-gray-400">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            <span class="text-[10px]">Profile</span>
        </button>
        <button onclick="switchTab('wallet')" id="btn-wallet" class="flex flex-col items-center text-gray-400">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg>
            <span class="text-[10px]">Wallet</span>
        </button>
    </div>

    <div id="proof-modal" class="fixed inset-0 bg-black bg-opacity-70 hidden flex items-center justify-center p-4 z-[60]">
        <div class="bg-white p-6 rounded-2xl max-w-sm w-full">
            <h3 class="font-bold mb-2">কাজের প্রমাণ জমা দিন</h3>
            <p id="modal-job-title" class="text-xs text-blue-600 mb-4 font-semibold"></p>
            <input type="file" id="imageInput" accept="image/*" class="w-full text-xs border p-2 rounded mb-4">
            <div class="flex gap-2">
                <button onclick="document.getElementById('proof-modal').classList.add('hidden')" class="flex-1 bg-gray-100 py-2 rounded-lg font-bold">বাতিল</button>
                <button id="submit-proof-btn" class="flex-1 bg-green-600 text-white py-2 rounded-lg font-bold">জমা দিন</button>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
