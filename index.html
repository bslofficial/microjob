<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MicroJobs BD - Proof Submit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .active-tab { color: #2563eb !important; font-weight: bold; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .animate-pop { animation: fadeIn 0.2s ease-out; }
    </style>
</head>
<body class="bg-slate-50 pb-24 overflow-x-hidden">

    <header class="bg-blue-600 text-white p-4 shadow-lg sticky top-0 z-50 flex justify-between items-center">
        <h1 class="font-bold text-lg">MicroJobs BD</h1>
        <div class="bg-blue-500 px-3 py-1 rounded-full text-[10px] font-bold">
            ৳<span id="nav-balance">0.00</span>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4">
        <div class="bg-gradient-to-br from-blue-600 to-blue-700 p-6 rounded-3xl text-white shadow-xl mb-6">
            <p class="opacity-80 text-[10px] font-bold uppercase">আপনার ব্যালেন্স</p>
            <h2 class="text-4xl font-extrabold mt-1">৳<span id="balance">0.00</span></h2>
        </div>

        <h3 class="font-bold text-gray-700 text-sm mb-4">চলমান কাজসমূহ:</h3>
        <div id="job-list" class="space-y-4"></div>
    </main>

    <div id="submit-modal" class="fixed inset-0 bg-black/70 hidden z-[100] flex items-center justify-center p-5">
        <div class="bg-white w-full max-w-sm rounded-[2rem] p-6 animate-pop shadow-2xl">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-blue-600">প্রুফ জমা দিন</h2>
                <button onclick="window.closeModal()" class="text-gray-400"><i class="fas fa-times"></i></button>
            </div>
            
            <p id="modal-job-title" class="text-[10px] text-gray-500 mb-4 bg-gray-50 p-2 rounded-lg font-medium"></p>
            <input type="hidden" id="modal-job-id">

            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase mb-1 block">আপনার কাজের স্ক্রিনশট</label>
                    <input type="file" id="proof-file" accept="image/*" class="w-full text-xs text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-[10px] file:font-bold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                </div>
                
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase mb-1 block">অতিরিক্ত তথ্য (বিকল্প)</label>
                    <textarea id="proof-note" class="w-full border rounded-2xl p-3 text-xs bg-gray-50 outline-none focus:border-blue-500 h-20" placeholder="ইউজার আইডি বা কাজের নাম লিখুন..."></textarea>
                </div>

                <button onclick="window.sendToTelegram()" id="submit-btn-action" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold text-xs shadow-lg shadow-blue-200 active:scale-95 transition-all">
                    টেলিগ্রামে প্রুফ পাঠান
                </button>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around py-4 z-50">
        <i class="fas fa-home text-blue-600"></i>
        <i class="fas fa-wallet text-gray-300"></i>
        <i class="fas fa-user text-gray-300"></i>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyANRqR887AfhoW4GxInZHH9J3YYWCfnjs0",
            authDomain: "microjobs-b9d90.firebaseapp.com",
            projectId: "microjobs-b9d90",
            storageBucket: "microjobs-b9d90.firebasestorage.app",
            messagingSenderId: "1006928193385",
            appId: "1:1006928193385:web:d4b5cc1911abda6ff53ff8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // --- আপনার টেলিগ্রাম বট তথ্য (এখানে আপডেট করা আছে) ---
        const BOT_TOKEN = "8658250586:AAEni2LGFdpUWQyTmLhNJ6zacg2BEknnxAE";
        const ADMIN_CHAT_ID = "8658250586"; 

        onAuthStateChanged(auth, (user) => {
            if (user) {
                loadJobs();
                onSnapshot(doc(db, "users", user.uid), (s) => {
                    if(s.exists()){
                        const d = s.data();
                        document.getElementById('balance').innerText = d.balance.toFixed(2);
                        document.getElementById('nav-balance').innerText = d.balance.toFixed(2);
                    }
                });
            }
        });

        const loadJobs = () => {
            onSnapshot(collection(db, "jobs"), (snap) => {
                const list = document.getElementById('job-list');
                list.innerHTML = "";
                snap.forEach(d => {
                    const job = d.data();
                    if(job.status === "active") {
                        list.innerHTML += `
                            <div class="bg-white p-5 rounded-3xl border border-gray-100 shadow-sm">
                                <h4 class="font-bold text-sm text-gray-800">${job.title}</h4>
                                <div class="flex justify-between items-center mt-4">
                                    <span class="text-blue-600 font-bold text-[11px]">পুরস্কার: ৳${job.budget}</span>
                                    <div class="flex gap-2">
                                        <a href="${job.url}" target="_blank" class="bg-blue-50 text-blue-600 px-4 py-2 rounded-xl text-[10px] font-bold">লিঙ্ক</a>
                                        <button onclick="window.openModal('${d.id}', '${job.title}')" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-[10px] font-bold">জমা দিন</button>
                                    </div>
                                </div>
                            </div>`;
                    }
                });
            });
        };

        window.openModal = (id, title) => {
            document.getElementById('modal-job-id').value = id;
            document.getElementById('modal-job-title').innerText = "কাজ: " + title;
            document.getElementById('submit-modal').classList.remove('hidden');
        };

        window.closeModal = () => {
            document.getElementById('submit-modal').classList.add('hidden');
            document.getElementById('proof-file').value = "";
            document.getElementById('proof-note').value = "";
        };

        window.sendToTelegram = async () => {
            const user = auth.currentUser;
            const jobId = document.getElementById('modal-job-id').value;
            const jobTitle = document.getElementById('modal-job-title').innerText;
            const note = document.getElementById('proof-note').value;
            const fileInput = document.getElementById('proof-file');

            if (fileInput.files.length === 0) return alert("দয়া করে স্ক্রিনশট সিলেক্ট করুন!");

            const btn = document.getElementById('submit-btn-action');
            btn.disabled = true;
            btn.innerText = "পাঠানো হচ্ছে...";

            const file = fileInput.files[0];
            const formData = new FormData();
            formData.append("chat_id", ADMIN_CHAT_ID);
            formData.append("photo", file);
            formData.append("caption", `🆕 নতুন কাজ জমা এসেছে!\n\n📧 ইউজার: ${user.email}\n📌 ${jobTitle}\n🆔 জব আইডি: ${jobId}\n📝 নোট: ${note || "নেই"}`);

            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: "POST",
                    body: formData
                });

                if (response.ok) {
                    alert("আপনার প্রুফ সফলভাবে টেলিগ্রামে পাঠানো হয়েছে। অ্যাডমিন চেক করে ব্যালেন্স যোগ করে দিবে।");
                    window.closeModal();
                } else {
                    alert("টেলিগ্রাম বটে পাঠাতে সমস্যা হয়েছে।");
                }
            } catch (err) {
                alert("ইন্টারনেট সংযোগ চেক করুন!");
            } finally {
                btn.disabled = false;
                btn.innerText = "টেলিগ্রামে প্রুফ পাঠান";
            }
        };
    </script>
</body>
</html>
