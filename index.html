<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MicroJobs BD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .active-tab { color: #2563eb !important; font-weight: bold; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        #side-menu { transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-slate-50 pb-24 overflow-x-hidden">

    <header class="bg-blue-600 text-white p-4 shadow-lg sticky top-0 z-50 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <button onclick="window.toggleMenu()" class="text-xl"><i class="fas fa-bars"></i></button>
            <h1 class="font-bold text-lg">MicroJobs BD</h1>
        </div>
        <div class="flex items-center gap-2">
            <span class="text-[10px] bg-blue-500 px-2 py-1 rounded-lg font-bold">৳<span id="nav-balance">0.00</span></span>
            <button onclick="window.switchTab('profile')" class="w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center border border-blue-400">
                <i class="fas fa-user text-xs"></i>
            </button>
        </div>
    </header>

    <div id="side-menu" class="fixed inset-y-0 left-0 w-64 bg-white shadow-2xl z-[60] transform -translate-x-full">
        <nav class="p-4 pt-10 space-y-1 text-gray-700">
            <button onclick="window.switchTab('home')" class="w-full text-left p-3 hover:bg-blue-50 rounded-xl flex items-center gap-3 text-sm font-medium">
                <i class="fas fa-home w-5 text-blue-600"></i> Home
            </button>
            <button onclick="window.switchTab('leaderboard')" class="w-full text-left p-3 hover:bg-blue-50 rounded-xl flex items-center gap-3 text-sm font-medium">
                <i class="fas fa-trophy w-5 text-yellow-500"></i> Leaderboard
            </button>
            <button onclick="window.switchTab('wallet')" class="w-full text-left p-3 hover:bg-blue-50 rounded-xl flex items-center gap-3 text-sm font-medium">
                <i class="fas fa-wallet w-5 text-blue-600"></i> Wallet / Deposit
            </button>
            <button onclick="window.switchTab('refer')" class="w-full text-left p-3 hover:bg-blue-50 rounded-xl flex items-center gap-3 text-sm font-medium">
                <i class="fas fa-gift w-5 text-purple-600"></i> Refer & Earn
            </button>
            <button onclick="window.switchTab('profile')" class="w-full text-left p-3 hover:bg-blue-50 rounded-xl flex items-center gap-3 text-sm font-medium">
                <i class="fas fa-user-circle w-5 text-blue-500"></i> My Profile
            </button>
            <hr class="my-4">
            <button id="logout-btn" class="w-full text-left p-3 text-red-500 font-bold hover:bg-red-50 rounded-xl flex items-center gap-3 text-sm">
                <i class="fas fa-sign-out-alt w-5"></i> Logout
            </button>
        </nav>
    </div>
    <div id="menu-overlay" onclick="window.toggleMenu()" class="fixed inset-0 bg-black/50 hidden z-[55]"></div>

    <main class="max-w-md mx-auto p-4">
        <div id="auth-view" class="bg-white p-8 rounded-3xl shadow-xl mt-10">
            <h2 class="text-xl font-bold mb-6 text-center text-blue-600">Login / Signup</h2>
            <input id="email" type="email" placeholder="ইমেইল" class="w-full border p-4 rounded-2xl mb-3 outline-none bg-gray-50 focus:border-blue-500 text-sm">
            <input id="password" type="password" placeholder="পাসওয়ার্ড" class="w-full border p-4 rounded-2xl mb-5 outline-none bg-gray-50 focus:border-blue-500 text-sm">
            <button id="login-btn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold mb-3 text-sm">Login</button>
            <button id="signup-btn" class="w-full text-blue-600 font-bold py-2 text-sm text-center block">Create Account</button>
        </div>

        <div id="main-view" class="hidden">
            <div id="home-tab" class="tab-content active">
                <div class="bg-gradient-to-br from-blue-600 to-blue-800 p-6 rounded-3xl text-white shadow-xl mb-6">
                    <p class="opacity-80 text-[10px] font-bold uppercase">ব্যালেন্স</p>
                    <h2 class="text-4xl font-extrabold mt-1">৳<span id="balance">0.00</span></h2>
                </div>
                <div id="job-list" class="space-y-4"></div>
            </div>

            <div id="leaderboard-tab" class="tab-content">
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2"><i class="fas fa-trophy text-yellow-500"></i> সেরা ১০ উপার্জনকারী</h2>
                <div id="leader-list" class="bg-white rounded-3xl shadow-sm border overflow-hidden divide-y"></div>
            </div>

            <div id="wallet-tab" class="tab-content space-y-4">
                <div class="bg-white p-5 rounded-3xl shadow-sm border border-blue-100">
                    <h2 class="font-bold text-blue-600 text-sm mb-3 uppercase flex items-center gap-2"><i class="fas fa-plus-circle"></i> Deposit</h2>
                    <div class="bg-blue-50 p-4 rounded-2xl mb-4 text-[11px] text-blue-700">
                        <p>বিকাশ/নগদ (Personal): <b>01913932587</b></p>
                    </div>
                    <input id="d-amount" type="number" placeholder="টাকার পরিমাণ (৳)" class="w-full p-3 bg-gray-50 rounded-xl mb-3 text-sm border outline-none">
                    <input id="d-trx" type="text" placeholder="Transaction ID" class="w-full p-3 bg-gray-50 rounded-xl mb-4 text-sm border outline-none">
                    <button id="deposit-btn" class="w-full bg-blue-600 text-white py-3.5 rounded-xl font-bold text-sm">ডিপোজিট রিকোয়েস্ট পাঠান</button>
                </div>
                </div>

            <div id="refer-tab" class="tab-content">
                <div class="bg-white p-6 rounded-3xl shadow-md text-center">
                    <h2 class="text-xl font-bold">রেফার করে আয়!</h2>
                    <div class="mt-6 p-4 bg-gray-50 rounded-2xl border-dashed border-2 border-blue-100 overflow-hidden">
                        <p id="refer-link" class="text-blue-600 font-bold text-xs truncate">লোড হচ্ছে...</p>
                    </div>
                    <button onclick="window.copyReferLink()" class="w-full bg-blue-600 text-white py-3 rounded-2xl mt-4 font-bold">কপি লিঙ্ক</button>
                </div>
            </div>

            <div id="profile-tab" class="tab-content space-y-4">
                <div class="bg-white p-6 rounded-3xl shadow-sm text-center border">
                    <h2 class="font-bold text-gray-800" id="prof-email-display">ইউজার ইমেইল</h2>
                    <button onclick="window.activateAccount()" id="activate-btn-prof" class="mt-3 px-4 py-1.5 bg-red-100 text-red-600 text-[10px] font-bold rounded-full">Activate Now (৳১০০)</button>
                </div>
                <button id="logout-btn-2" class="w-full p-4 bg-white rounded-2xl border text-red-500 font-bold text-sm">লগআউট</button>
            </div>
        </div>
    </main>

    <div id="submit-modal" class="fixed inset-0 bg-black/60 hidden z-[100] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[2rem] p-6 shadow-2xl">
            <h2 class="text-lg font-bold text-blue-600 mb-4">কাজ জমা দিন</h2>
            <input type="hidden" id="modal-job-id">
            <input type="hidden" id="modal-job-title">
            <input type="hidden" id="modal-job-budget">
            
            <div class="space-y-4">
                <input type="file" id="proof-file" accept="image/*" class="w-full text-xs">
                <textarea id="proof-note" class="w-full border rounded-xl p-3 text-xs h-20 outline-none" placeholder="অতিরিক্ত তথ্য..."></textarea>
                <div class="flex gap-2">
                    <button onclick="window.closeModal()" class="flex-1 bg-gray-100 py-3 rounded-xl font-bold text-xs">বাতিল</button>
                    <button onclick="window.sendToTelegram()" id="submit-btn-action" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold text-xs">টেলিগ্রামে পাঠান</button>
                </div>
            </div>
        </div>
    </div>

    <nav id="bottom-nav" class="hidden fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around py-3 z-50">
        <button onclick="window.switchTab('home')" id="btn-home" class="flex flex-col items-center active-tab"><i class="fas fa-home"></i><span class="text-[9px]">Home</span></button>
        <button onclick="window.switchTab('leaderboard')" id="btn-leaderboard" class="flex flex-col items-center text-gray-400"><i class="fas fa-trophy"></i><span class="text-[9px]">Top 10</span></button>
        <button onclick="window.switchTab('wallet')" id="btn-wallet" class="flex flex-col items-center text-gray-400"><i class="fas fa-wallet"></i><span class="text-[9px]">Wallet</span></button>
        <button onclick="window.switchTab('profile')" id="btn-profile" class="flex flex-col items-center text-gray-400"><i class="fas fa-user"></i><span class="text-[9px]">Profile</span></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, query, orderBy, limit, setDoc, getDoc, updateDoc, addDoc, serverTimestamp, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyANRqR887AfhoW4GxInZHH9J3YYWCfnjs0",
            authDomain: "microjobs-b9d90.firebaseapp.com",
            projectId: "microjobs-b9d90",
            storageBucket: "microjobs-b9d90.firebasestorage.app",
            messagingSenderId: "1006928193385",
            appId: "1:1006928193385:web:d4b5cc1911abda6ff53ff8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const BOT_TOKEN = "8658250586:AAEni2LGFdpUWQyTmLhNJ6zacg2BEknnxAE";
        const ADMIN_CHAT_ID = "8658250586";

        window.toggleMenu = () => {
            const menu = document.getElementById('side-menu');
            const isOpen = menu.style.transform === 'translateX(0px)';
            menu.style.transform = isOpen ? 'translateX(-100%)' : 'translateX(0px)';
            document.getElementById('menu-overlay').classList.toggle('hidden');
        };

        window.switchTab = (tab) => {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(tab + '-tab').classList.add('active');
            document.querySelectorAll('#bottom-nav button').forEach(b => { b.classList.remove('active-tab'); b.classList.add('text-gray-400'); });
            document.getElementById('btn-'+tab).classList.add('active-tab');
            if(tab === 'leaderboard') loadLeaderboard();
            if(document.getElementById('side-menu').style.transform === 'translateX(0px)') window.toggleMenu();
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-view').classList.add('hidden');
                document.getElementById('main-view').classList.remove('hidden');
                document.getElementById('bottom-nav').classList.remove('hidden');
                document.getElementById('prof-email-display').innerText = user.email;
                document.getElementById('refer-link').innerText = `${window.location.origin}${window.location.pathname}?ref=${user.uid}`;
                loadJobs();
                onSnapshot(doc(db, "users", user.uid), (s) => {
                    if(s.exists()){
                        const d = s.data();
                        document.getElementById('balance').innerText = d.balance.toFixed(2);
                        document.getElementById('nav-balance').innerText = d.balance.toFixed(2);
                    }
                });
            } else {
                document.getElementById('auth-view').classList.remove('hidden');
                document.getElementById('main-view').classList.add('hidden');
            }
        });

        const loadJobs = () => {
            onSnapshot(collection(db, "jobs"), (snap) => {
                const list = document.getElementById('job-list');
                list.innerHTML = "";
                snap.forEach(d => {
                    const job = d.data();
                    if(job.status === "active") {
                        list.innerHTML += `
                            <div class="bg-white p-5 rounded-3xl border border-gray-100 shadow-sm">
                                <h4 class="font-bold text-sm">${job.title}</h4>
                                <div class="flex justify-between items-center mt-4">
                                    <span class="text-blue-600 font-bold text-[11px]">৳${job.budget}</span>
                                    <div class="flex gap-2">
                                        <a href="${job.url}" target="_blank" class="bg-blue-50 text-blue-600 px-4 py-2 rounded-xl text-[10px] font-bold">কাজ শুরু</a>
                                        <button onclick="window.openModal('${d.id}', '${job.title}', '${job.budget}')" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-[10px] font-bold">জমা দিন</button>
                                    </div>
                                </div>
                            </div>`;
                    }
                });
            });
        };

        window.openModal = (id, title, budget) => {
            document.getElementById('modal-job-id').value = id;
            document.getElementById('modal-job-title').value = title;
            document.getElementById('modal-job-budget').value = budget;
            document.getElementById('submit-modal').classList.remove('hidden');
        };

        window.closeModal = () => document.getElementById('submit-modal').classList.add('hidden');

        window.sendToTelegram = async () => {
            const user = auth.currentUser;
            const fileInput = document.getElementById('proof-file');
            if (fileInput.files.length === 0) return alert("স্ক্রিনশট দিন!");

            const btn = document.getElementById('submit-btn-action');
            btn.disabled = true; btn.innerText = "পাঠানো হচ্ছে...";

            const formData = new FormData();
            formData.append("chat_id", ADMIN_CHAT_ID);
            formData.append("photo", fileInput.files[0]);
            formData.append("caption", `📝 নতুন কাজ জমা!\nইউজার: ${user.email}\nকাজ: ${document.getElementById('modal-job-title').value}\nবাজেট: ${document.getElementById('modal-job-budget').value}\nনোট: ${document.getElementById('proof-note').value}`);

            try {
                const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: "POST", body: formData });
                if (res.ok) {
                    await addDoc(collection(db, "proofs"), { uid: user.uid, email: user.email, jobId: document.getElementById('modal-job-id').value, title: document.getElementById('modal-job-title').value, budget: Number(document.getElementById('modal-job-budget').value), status: "pending", createdAt: serverTimestamp() });
                    alert("সফলভাবে পাঠানো হয়েছে!"); window.closeModal();
                }
            } catch (e) { alert("সমস্যা হয়েছে!"); }
            finally { btn.disabled = false; btn.innerText = "টেলিগ্রামে পাঠান"; }
        };

        // --- Auth Actions ---
        document.getElementById('login-btn').onclick = () => {
            signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value).catch(e => alert("ভুল ইমেইল/পাসওয়ার্ড"));
        };

        document.getElementById('signup-btn').onclick = () => {
            const email = document.getElementById('email').value;
            const ref = new URLSearchParams(window.location.search).get('ref');
            createUserWithEmailAndPassword(auth, email, document.getElementById('password').value).then(async (c) => {
                await setDoc(doc(db, "users", c.user.uid), { email, balance: 0, isActive: false, referredBy: ref || null, totalRefers: 0, createdAt: serverTimestamp() });
            });
        };

        document.getElementById('deposit-btn').onclick = async () => {
            const amt = Number(document.getElementById('d-amount').value);
            const trx = document.getElementById('d-trx').value;
            if(!amt || !trx) return alert("তথ্য দিন");
            await addDoc(collection(db, "deposits"), { uid: auth.currentUser.uid, email: auth.currentUser.email, amount: amt, trxId: trx, status: "pending", createdAt: serverTimestamp() });
            alert("ডিপোজিট রিকোয়েস্ট পাঠানো হয়েছে!");
        };

        document.getElementById('logout-btn').onclick = () => signOut(auth).then(() => location.reload());
    </script>
</body>
</html>
