<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MicroJobs BD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .active-tab { color: #2563eb !important; font-weight: bold; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        #side-menu { transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-slate-50 pb-20 overflow-x-hidden">

    <header class="bg-blue-600 text-white p-4 shadow-lg sticky top-0 z-50 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <button onclick="window.toggleMenu()" class="text-xl"><i class="fas fa-bars"></i></button>
            <h1 class="font-bold text-lg">MicroJobs BD</h1>
        </div>
        <button onclick="window.toggleMenu()" class="w-10 h-10 bg-blue-500 rounded-full flex items-center justify-center border-2 border-blue-400">
            <i class="fas fa-user text-white"></i>
        </button>
    </header>

    <div id="side-menu" class="fixed inset-y-0 left-0 w-64 bg-white shadow-2xl z-[60] transform -translate-x-full">
        <div class="p-6 bg-blue-600 text-white">
            <div class="w-14 h-14 bg-white/20 rounded-full flex items-center justify-center text-xl mb-3">
                <i class="fas fa-user-circle"></i>
            </div>
            <p id="user-email-display" class="text-xs truncate">স্বাগতম!</p>
            <p id="account-status" class="text-[10px] font-bold mt-1 px-2 py-0.5 bg-red-500 rounded-full inline-block">Not Active</p>
        </div>
        <nav class="p-4 space-y-1 text-gray-700">
            <button onclick="window.switchTab('home')" class="w-full text-left p-3 hover:bg-blue-50 rounded-xl flex items-center gap-3 text-sm"><i class="fas fa-home w-5"></i> Home</button>
            <button onclick="window.switchTab('post-job')" class="w-full text-left p-3 hover:bg-blue-50 rounded-xl flex items-center gap-3 text-sm"><i class="fas fa-plus-circle w-5"></i> Post Job</button>
            <button onclick="window.switchTab('wallet')" class="w-full text-left p-3 hover:bg-blue-50 rounded-xl flex items-center gap-3 text-sm"><i class="fas fa-wallet w-5"></i> Wallet</button>
            <hr class="my-2">
            <button onclick="window.switchTab('refer')" class="w-full text-left p-3 hover:bg-blue-50 rounded-xl flex items-center gap-3 text-sm text-blue-600 font-bold"><i class="fas fa-gift w-5"></i> Refer & Earn</button>
            <button onclick="window.activateAccount()" class="w-full text-left p-3 text-blue-600 font-bold hover:bg-blue-50 rounded-xl flex items-center gap-3 text-sm"><i class="fas fa-check-circle w-5"></i> Activate (৳১০০)</button>
            <hr class="my-2">
            <button id="logout-btn" class="w-full text-left p-3 text-red-500 font-bold hover:bg-red-50 rounded-xl flex items-center gap-3 text-sm"><i class="fas fa-sign-out-alt w-5"></i> Logout</button>
        </nav>
    </div>
    <div id="menu-overlay" onclick="window.toggleMenu()" class="fixed inset-0 bg-black/50 hidden z-[55]"></div>

    <main class="max-w-md mx-auto p-4">
        <div id="auth-view" class="bg-white p-8 rounded-3xl shadow-xl mt-10">
            <h2 class="text-xl font-bold mb-6 text-center text-blue-600">Login / Signup</h2>
            <input id="email" type="email" placeholder="ইমেইল" class="w-full border p-4 rounded-2xl mb-3 outline-none bg-gray-50 focus:border-blue-500 text-sm">
            <input id="password" type="password" placeholder="পাসওয়ার্ড" class="w-full border p-4 rounded-2xl mb-5 outline-none bg-gray-50 focus:border-blue-500 text-sm">
            <button id="login-btn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold mb-2">Login</button>
            <button id="signup-btn" class="w-full text-blue-600 font-bold py-3 text-sm">Create Account / Sign Up</button>
        </div>

        <div id="main-view" class="hidden">
            <div id="home-tab" class="tab-content active">
                <div class="bg-gradient-to-br from-blue-600 to-blue-800 p-6 rounded-3xl text-white shadow-xl mb-6">
                    <p class="opacity-80 text-[10px] font-bold uppercase">আপনার ব্যালেন্স</p>
                    <h2 class="text-4xl font-extrabold mt-1">৳<span id="balance">0.00</span></h2>
                </div>
                <div id="job-list" class="space-y-4">
                    <p class="text-center text-gray-400 text-xs py-10">কাজ লোড হচ্ছে...</p>
                </div>
            </div>

            <div id="wallet-tab" class="tab-content space-y-4">
                <div class="bg-white p-5 rounded-3xl shadow-sm border border-green-100">
                    <h2 class="font-bold text-green-600 text-sm mb-3">ডিপোজিট (বিকাশ: 01913932587)</h2>
                    <input id="d-amount" type="number" placeholder="পরিমাণ" class="w-full p-3 bg-gray-50 rounded-xl mb-2 text-sm outline-none border">
                    <input id="d-trx" type="text" placeholder="Transaction ID" class="w-full p-3 bg-gray-50 rounded-xl mb-3 text-sm outline-none border">
                    <button id="deposit-btn" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold text-sm">জমা রিকোয়েস্ট</button>
                </div>
                <div class="bg-white p-5 rounded-3xl shadow-sm border border-orange-100">
                    <h2 class="font-bold text-orange-600 text-sm mb-3">উইথড্র রিকোয়েস্ট</h2>
                    <input id="w-amount" type="number" placeholder="পরিমাণ (৳৫০+)" class="w-full p-3 bg-gray-50 rounded-xl mb-2 text-sm outline-none border">
                    <input id="w-number" type="text" placeholder="বিকাশ/নগদ নম্বর" class="w-full p-3 bg-gray-50 rounded-xl mb-3 text-sm outline-none border">
                    <button id="withdraw-btn" class="w-full bg-orange-600 text-white py-3 rounded-xl font-bold text-sm">উইথড্র দিন</button>
                </div>
            </div>

            <div id="post-job-tab" class="tab-content">
                <div id="post-job-form" class="bg-white p-6 rounded-3xl shadow-sm border hidden">
                    <h2 class="font-bold text-blue-700 mb-4">পোস্ট জব (অ্যাডমিন অ্যাপ্রুভাল)</h2>
                    <input id="u-job-title" type="text" placeholder="কাজের শিরোনাম" class="w-full p-3 bg-gray-50 rounded-xl mb-3 text-sm outline-none border">
                    <textarea id="u-job-desc" rows="4" placeholder="কাজের নিয়মাবলী..." class="w-full p-3 bg-gray-50 rounded-xl mb-3 text-sm outline-none border"></textarea>
                    <input id="u-job-url" type="url" placeholder="কাজের লিঙ্ক" class="w-full p-3 bg-gray-50 rounded-xl mb-3 text-sm outline-none border">
                    <button id="u-post-btn" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">সাবমিট</button>
                </div>
                <div id="activation-warning" class="text-center py-20 text-gray-400">
                    <i class="fas fa-lock text-5xl mb-4"></i>
                    <p class="text-sm">জব পোস্ট করতে অ্যাকাউন্ট এক্টিভেট করুন।</p>
                </div>
            </div>

            <div id="refer-tab" class="tab-content">
                <div class="bg-white p-6 rounded-3xl shadow-md text-center border">
                    <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center text-2xl mx-auto mb-4">
                        <i class="fas fa-gift"></i>
                    </div>
                    <h2 class="text-xl font-bold text-gray-800">রেফার করে আয় করুন!</h2>
                    <div class="mt-6 p-4 bg-gray-50 rounded-2xl border-2 border-dashed border-blue-100 overflow-hidden">
                        <p id="refer-link" class="text-blue-600 font-bold text-xs truncate">লোড হচ্ছে...</p>
                    </div>
                    <button onclick="window.copyReferLink()" class="w-full bg-blue-600 text-white py-3 rounded-2xl mt-4 font-bold">লিঙ্ক কপি করুন</button>
                </div>
            </div>
        </div>
    </main>

    <nav id="bottom-nav" class="hidden fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around py-3 z-50">
        <button onclick="window.switchTab('home')" id="btn-home" class="flex flex-col items-center active-tab">
            <i class="fas fa-home"></i><span class="text-[9px] mt-1">Home</span>
        </button>
        <button onclick="window.switchTab('post-job')" id="btn-post-job" class="flex flex-col items-center text-gray-400">
            <i class="fas fa-plus-circle"></i><span class="text-[9px] mt-1">Post Job</span>
        </button>
        <button onclick="window.switchTab('wallet')" id="btn-wallet" class="flex flex-col items-center text-gray-400">
            <i class="fas fa-wallet"></i><span class="text-[9px] mt-1">Wallet</span>
        </button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, increment, addDoc, collection, onSnapshot, serverTimestamp, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyANRqR887AfhoW4GxInZHH9J3YYWCfnjs0",
            authDomain: "microjobs-b9d90.firebaseapp.com",
            projectId: "microjobs-b9d90",
            storageBucket: "microjobs-b9d90.firebasestorage.app",
            messagingSenderId: "1006928193385",
            appId: "1:1006928193385:web:d4b5cc1911abda6ff53ff8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // UI Controls
        window.toggleMenu = () => {
            const menu = document.getElementById('side-menu');
            const overlay = document.getElementById('menu-overlay');
            const isOpen = menu.style.transform === 'translateX(0px)';
            menu.style.transform = isOpen ? 'translateX(-100%)' : 'translateX(0px)';
            overlay.classList.toggle('hidden');
        };

        window.switchTab = (tab) => {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(tab + '-tab').classList.add('active');
            document.querySelectorAll('#bottom-nav button').forEach(el => {
                el.classList.remove('active-tab');
                el.classList.add('text-gray-400');
            });
            document.getElementById('btn-' + tab).classList.add('active-tab');
            document.getElementById('btn-' + tab).classList.remove('text-gray-400');
            if(document.getElementById('side-menu').style.transform === 'translateX(0px)') window.toggleMenu();
        };

        window.copyReferLink = () => {
            const link = document.getElementById('refer-link').innerText;
            navigator.clipboard.writeText(link).then(() => alert("Refer link copied!"));
        };

        // Load Jobs
        const loadJobs = () => {
            const container = document.getElementById('job-list');
            onSnapshot(collection(db, "jobs"), (snap) => {
                container.innerHTML = "";
                let hasActiveJobs = false;
                snap.forEach(doc => {
                    const job = doc.data();
                    if(job.status === "active") {
                        hasActiveJobs = true;
                        container.innerHTML += `
                            <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 mb-3">
                                <h3 class="font-bold text-sm text-gray-800">${job.title}</h3>
                                <p class="text-[10px] text-gray-500 mt-1">${job.description || 'নিয়ম অনুযায়ী কাজ করুন'}</p>
                                <div class="flex justify-between items-center mt-3">
                                    <p class="text-[11px] text-blue-600 font-bold">বাজেট: ৳${job.budget}</p>
                                    <a href="${job.url}" target="_blank" class="bg-blue-600 text-white px-4 py-1.5 rounded-xl text-[10px] font-bold">কাজটি করুন</a>
                                </div>
                            </div>`;
                    }
                });
                if(!hasActiveJobs) container.innerHTML = "<p class='text-center text-gray-400 text-xs py-10'>বর্তমানে কোনো কাজ নেই</p>";
            });
        };

        // Auth Operations
        document.getElementById('login-btn').onclick = () => {
            const email = document.getElementById('email').value.trim(); // Trim added
            const pass = document.getElementById('password').value;
            if(!email || !pass) return alert("ইমেইল ও পাসওয়ার্ড দিন");
            signInWithEmailAndPassword(auth, email, pass).catch(e => alert("লগইন ব্যর্থ হয়েছে: " + e.message));
        };

        document.getElementById('signup-btn').onclick = () => {
            const email = document.getElementById('email').value.trim(); // Trim essential for invalid-email error
            const pass = document.getElementById('password').value;
            if(!email || !pass) return alert("ইমেইল ও পাসওয়ার্ড দিন");
            
            const ref = new URLSearchParams(window.location.search).get('ref');
            createUserWithEmailAndPassword(auth, email, pass).then(async (cred) => {
                await setDoc(doc(db, "users", cred.user.uid), {
                    email, 
                    balance: 0, 
                    isActive: false, 
                    referredBy: ref || null, 
                    totalRefers: 0, 
                    createdAt: serverTimestamp()
                });
                alert("অ্যাকাউন্ট তৈরি সফল!");
            }).catch(e => alert("সাইনআপ ভুল: " + e.message));
        };

        // Wallet Operations
        document.getElementById('deposit-btn').onclick = async () => {
            const amt = document.getElementById('d-amount').value;
            const trx = document.getElementById('d-trx').value;
            if(!amt || !trx) return alert("সব তথ্য দিন");
            await addDoc(collection(db, "deposits"), {
                uid: auth.currentUser.uid, email: auth.currentUser.email,
                amount: Number(amt), trxId: trx, status: "pending", createdAt: serverTimestamp()
            });
            alert("ডিপোজিট রিকোয়েস্ট পাঠানো হয়েছে!");
        };

        document.getElementById('withdraw-btn').onclick = async () => {
            const amt = Number(document.getElementById('w-amount').value);
            const num = document.getElementById('w-number').value;
            if(amt < 50) return alert("মিনিমাম ৫০ টাকা");
            
            const userRef = doc(db, "users", auth.currentUser.uid);
            const userSnap = await getDoc(userRef);
            if(userSnap.data().balance >= amt) {
                await addDoc(collection(db, "withdraws"), {
                    uid: auth.currentUser.uid, email: auth.currentUser.email,
                    amount: amt, number: num, status: "pending", createdAt: serverTimestamp()
                });
                await updateDoc(userRef, { balance: increment(-amt) });
                alert("উইথড্র রিকোয়েস্ট সফল!");
            } else { alert("ব্যালেন্স পর্যাপ্ত নয়"); }
        };

        // Job Posting
        document.getElementById('u-post-btn').onclick = async () => {
            const title = document.getElementById('u-job-title').value;
            const desc = document.getElementById('u-job-desc').value;
            const url = document.getElementById('u-job-url').value;
            if(!title || !desc || !url) return alert("সব তথ্য দিন");
            
            await addDoc(collection(db, "jobs"), {
                uid: auth.currentUser.uid, 
                email: auth.currentUser.email,
                title, 
                description: desc, 
                url, 
                status: "pending", 
                budget: 1, 
                createdAt: serverTimestamp()
            });
            alert("পোস্টটি অনুমোদনের জন্য পাঠানো হয়েছে");
            document.getElementById('u-post-btn').disabled = true;
        };

        // Account Activation
        window.activateAccount = async () => {
            const userRef = doc(db, "users", auth.currentUser.uid);
            const userSnap = await getDoc(userRef);
            if(userSnap.data().balance >= 100) {
                await updateDoc(userRef, { balance: increment(-100), isActive: true });
                alert("অভিনন্দন! আপনার অ্যাকাউন্ট এক্টিভেট হয়েছে।");
            } else { alert("ব্যালেন্স কমপক্ষে ১০০ টাকা হতে হবে।"); }
        };

        // Auth State Listener
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-view').classList.add('hidden');
                document.getElementById('main-view').classList.remove('hidden');
                document.getElementById('bottom-nav').classList.remove('hidden');
                document.getElementById('user-email-display').innerText = user.email;
                document.getElementById('refer-link').innerText = `${window.location.origin}${window.location.pathname}?ref=${user.uid}`;
                
                loadJobs();

                onSnapshot(doc(db, "users", user.uid), (s) => {
                    if(s.exists()){
                        const d = s.data();
                        document.getElementById('balance').innerText = d.balance.toFixed(2);
                        document.getElementById('account-status').innerText = d.isActive ? "Active" : "Not Active";
                        document.getElementById('account-status').className = d.isActive ? 
                            "text-[10px] font-bold mt-1 px-2 py-0.5 bg-green-500 rounded-full inline-block" : 
                            "text-[10px] font-bold mt-1 px-2 py-0.5 bg-red-500 rounded-full inline-block";
                        
                        if(d.isActive) {
                            document.getElementById('post-job-form').classList.remove('hidden');
                            document.getElementById('activation-warning').classList.add('hidden');
                        }
                    }
                });
            } else {
                document.getElementById('auth-view').classList.remove('hidden');
                document.getElementById('main-view').classList.add('hidden');
                document.getElementById('bottom-nav').classList.add('hidden');
            }
        });

        document.getElementById('logout-btn').onclick = () => signOut(auth).then(() => location.reload());
    </script>
</body>
</html>
