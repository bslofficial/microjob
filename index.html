<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MicroJobs BD - Earn Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 pb-20"> <nav class="bg-blue-800 text-white shadow-lg sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="font-bold text-xl tracking-tight">MicroJobs BD</h1>
            <div class="flex items-center gap-3">
                <div class="relative group">
                    <button class="bg-blue-700 px-3 py-1.5 rounded-lg flex items-center gap-1 text-sm font-medium hover:bg-blue-600 transition">
                        ক্যাটাগরি
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </button>
                    <div class="absolute right-0 mt-2 w-40 bg-white text-gray-800 rounded-lg shadow-xl border hidden group-hover:block overflow-hidden z-50">
                        <a href="#" onclick="filterJobs('all')" class="block px-4 py-2 hover:bg-blue-50 transition border-b">সব কাজ</a>
                        <a href="#" onclick="filterJobs('Youtube')" class="block px-4 py-2 hover:bg-blue-50 transition border-b">YouTube</a>
                        <a href="#" onclick="filterJobs('Facebook')" class="block px-4 py-2 hover:bg-blue-50 transition border-b">Facebook</a>
                        <a href="#" onclick="filterJobs('App')" class="block px-4 py-2 hover:bg-blue-50 transition">Install App</a>
                    </div>
                </div>
                <div id="auth-info" class="hidden items-center gap-2">
                    <button id="logout-btn" class="bg-red-500 hover:bg-red-600 px-3 py-1.5 rounded-lg text-xs font-bold">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4">
        <div id="auth-view" class="bg-white p-8 rounded-2xl shadow-xl mt-10 max-w-sm mx-auto border border-gray-200">
            <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">স্বাগতম!</h2>
            <div class="space-y-4">
                <input id="email" type="email" placeholder="আপনার ইমেইল" class="w-full border p-3 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                <input id="password" type="password" placeholder="পাসওয়ার্ড" class="w-full border p-3 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                <button id="login-btn" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition">Login</button>
                <div class="text-center text-gray-400 text-sm">অথবা</div>
                <button id="signup-btn" class="w-full border-2 border-blue-600 text-blue-600 py-2.5 rounded-lg font-bold hover:bg-blue-50 transition">Sign Up</button>
            </div>
        </div>

        <div id="main-view" class="hidden">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                <div class="bg-gradient-to-br from-blue-700 to-blue-500 p-6 rounded-2xl text-white shadow-lg">
                    <p class="opacity-80">বর্তমান ব্যালেন্স</p>
                    <h2 class="text-4xl font-bold mt-1">৳<span id="balance">0.00</span></h2>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-md border-l-8 border-orange-500">
                    <h3 class="font-bold text-gray-700 mb-3 text-sm">টাকা উত্তোলন (Withdraw)</h3>
                    <input id="withdraw-amount" type="number" placeholder="পরিমাণ" class="border p-2 rounded-lg w-full mb-2 text-sm">
                    <input id="bkash-number" type="text" placeholder="বিকাশ/নগদ নম্বর" class="border p-2 rounded-lg w-full mb-3 text-sm">
                    <button id="withdraw-btn" class="w-full bg-orange-500 text-white py-2 rounded-lg font-bold hover:bg-orange-600 transition text-sm">রিকোয়েস্ট পাঠান</button>
                </div>
            </div>

            <h2 class="text-xl font-bold mb-5 text-gray-800 border-b pb-2">উপলব্ধ কাজসমূহ</h2>
            <div id="job-list" class="grid gap-4"></div>
        </div>
    </main>

    <div id="bottom-bar" class="hidden fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around py-3 shadow-[0_-2px_10px_rgba(0,0,0,0.1)] z-50">
        <button onclick="location.reload()" class="flex flex-col items-center text-blue-600">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
            <span class="text-[10px] font-bold">Home</span>
        </button>
        <button onclick="alert('Profile Loading...')" class="flex flex-col items-center text-gray-400">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            <span class="text-[10px]">Profile</span>
        </button>
        <button onclick="alert('Wallet Loading...')" class="flex flex-col items-center text-gray-400">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg>
            <span class="text-[10px]">Wallet</span>
        </button>
    </div>

    <div id="proof-modal" class="fixed inset-0 bg-black bg-opacity-70 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white p-6 rounded-2xl max-w-md w-full">
            <h3 class="text-xl font-bold mb-2">কাজের প্রমাণ জমা দিন</h3>
            <p id="modal-job-title" class="text-blue-600 font-semibold mb-4 text-sm"></p>
            <input type="file" id="imageInput" accept="image/*" class="w-full border p-2 mb-4 rounded-lg bg-gray-50 text-sm">
            <div class="flex justify-end gap-3">
                <button onclick="document.getElementById('proof-modal').classList.add('hidden')" class="px-5 py-2 bg-gray-100 rounded-lg">বাতিল</button>
                <button id="submit-proof-btn" class="px-6 py-2 bg-green-600 text-white rounded-lg font-bold">জমা দিন</button>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
