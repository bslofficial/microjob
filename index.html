<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MicroJobs BD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; }
        .active-tab { color: #2563eb !important; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        #side-menu { transition: transform 0.3s ease; }
        .verified-badge { font-size: 8px; padding: 2px 6px; border-radius: 4px; background: #e0f2fe; color: #0369a1; font-weight: bold; }
    </style>
</head>
<body class="bg-slate-50 pb-20">

    <header class="bg-blue-600 text-white p-4 sticky top-0 z-50 flex justify-between items-center shadow-md">
        <div class="flex items-center gap-3">
            <button onclick="toggleMenu()" class="text-xl"><i class="fas fa-bars"></i></button>
            <h1 class="font-bold text-lg">MicroJobs BD</h1>
        </div>
        <div class="flex items-center gap-2">
            <div class="bg-blue-500/50 px-3 py-1 rounded-full text-xs font-bold border border-white/20">
                ৳<span id="nav-balance">0.00</span>
            </div>
            <div class="w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center relative">
                <i class="fas fa-bell text-sm"></i>
                <span class="absolute top-0 right-0 w-2 h-2 bg-red-500 rounded-full border border-white"></span>
            </div>
        </div>
    </header>

    <div id="menu-overlay" onclick="toggleMenu()" class="fixed inset-0 bg-black/40 hidden z-[55]"></div>
    <div id="side-menu" class="fixed inset-y-0 left-0 w-72 bg-white shadow-2xl z-[60] transform -translate-x-full">
        <div class="p-6 space-y-2 mt-10">
            <button onclick="switchTab('home')" class="w-full text-left p-3 hover:bg-blue-50 rounded-xl flex items-center gap-4 text-gray-700 font-semibold">
                <i class="fas fa-home text-blue-600"></i> Home
            </button>
            <button onclick="switchTab('leaderboard')" class="w-full text-left p-3 hover:bg-blue-50 rounded-xl flex items-center gap-4 text-gray-700 font-semibold">
                <i class="fas fa-trophy text-yellow-500"></i> Leaderboard
            </button>
            <button onclick="switchTab('wallet')" class="w-full text-left p-3 hover:bg-blue-50 rounded-xl flex items-center gap-4 text-gray-700 font-semibold">
                <i class="fas fa-wallet text-blue-600"></i> Wallet / Deposit
            </button>
            <button onclick="switchTab('refer')" class="w-full text-left p-3 hover:bg-blue-50 rounded-xl flex items-center gap-4 text-gray-700 font-semibold">
                <i class="fas fa-gift text-purple-600"></i> Refer & Earn
            </button>
            <button onclick="switchTab('profile')" class="w-full text-left p-3 hover:bg-blue-50 rounded-xl flex items-center gap-4 text-gray-700 font-semibold">
                <i class="fas fa-user-circle text-blue-500"></i> My Profile
            </button>
            <hr class="my-4">
            <button onclick="handleLogout()" class="w-full text-left p-3 text-red-500 font-bold hover:bg-red-50 rounded-xl flex items-center gap-4">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </div>

    <main class="p-4 max-w-md mx-auto">
        <div id="auth-view" class="bg-white p-8 rounded-3xl shadow-xl mt-10 hidden">
             <h2 class="text-xl font-bold mb-6 text-center">Login to Continue</h2>
             <input id="email" type="email" placeholder="Email" class="w-full border p-4 rounded-2xl mb-3 outline-none bg-gray-50">
             <input id="password" type="password" placeholder="Password" class="w-full border p-4 rounded-2xl mb-5 outline-none bg-gray-50">
             <button id="login-btn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold mb-3">Login</button>
        </div>

        <div id="main-view">
            <div id="home-tab" class="tab-content active">
                <div class="bg-gradient-to-br from-blue-600 to-blue-800 p-8 rounded-[40px] text-white shadow-xl mb-8 relative overflow-hidden">
                    <p class="opacity-70 text-xs font-bold mb-1">ব্যালেন্স</p>
                    <h2 class="text-5xl font-extrabold">৳<span id="balance">0.00</span></h2>
                    <div class="absolute -right-10 -bottom-10 w-40 h-40 bg-white/10 rounded-full blur-3xl"></div>
                </div>

                <h3 class="font-bold text-gray-700 mb-4 ml-1">আপনার জন্য কাজ:</h3>
                <div id="job-list" class="space-y-4">
                    </div>
            </div>

            <div id="leaderboard-tab" class="tab-content">
                <h2 class="font-bold text-lg mb-4">Leaderboard</h2>
                <div id="leader-list" class="bg-white rounded-3xl border divide-y overflow-hidden"></div>
            </div>

            <div id="wallet-tab" class="tab-content">
                <div class="bg-white p-6 rounded-3xl border shadow-sm">
                    <h2 class="font-bold text-blue-600 mb-4 uppercase text-sm"><i class="fas fa-plus-circle mr-2"></i> Deposit</h2>
                    <input id="d-amount" type="number" placeholder="টাকার পরিমাণ" class="w-full p-4 bg-gray-50 rounded-2xl mb-3 border outline-none">
                    <input id="d-trx" type="text" placeholder="TrxID" class="w-full p-4 bg-gray-50 rounded-2xl mb-4 border outline-none">
                    <button id="deposit-btn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold">ডিপোজিট রিকোয়েস্ট পাঠান</button>
                </div>
            </div>

            <div id="profile-tab" class="tab-content text-center">
                <div class="bg-white p-8 rounded-3xl border shadow-sm mb-4">
                    <div class="w-20 h-20 bg-blue-100 rounded-full mx-auto mb-4 flex items-center justify-center">
                        <i class="fas fa-user text-3xl text-blue-600"></i>
                    </div>
                    <h2 class="font-bold text-lg" id="prof-email">Loading...</h2>
                    <button id="act-btn" class="mt-3 px-6 py-2 bg-red-100 text-red-600 text-xs font-bold rounded-full">Activate Account (৳১০০)</button>
                </div>
                <button onclick="handleLogout()" class="w-full p-4 bg-white text-red-500 font-bold rounded-2xl border">লগআউট</button>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around py-3 px-2 z-50">
        <button onclick="switchTab('home')" class="flex flex-col items-center text-gray-400 active-tab"><i class="fas fa-home mb-1"></i><span class="text-[10px]">Home</span></button>
        <button onclick="switchTab('leaderboard')" class="flex flex-col items-center text-gray-400"><i class="fas fa-trophy mb-1"></i><span class="text-[10px]">Top 10</span></button>
        <button onclick="switchTab('wallet')" class="flex flex-col items-center text-gray-400"><i class="fas fa-wallet mb-1"></i><span class="text-[10px]">Wallet</span></button>
        <button onclick="switchTab('profile')" class="flex flex-col items-center text-gray-400"><i class="fas fa-user mb-1"></i><span class="text-[10px]">Profile</span></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, updateDoc, increment, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyANRqR887AfhoW4GxInZHH9J3YYWCfnjs0",
            authDomain: "microjobs-b9d90.firebaseapp.com",
            projectId: "microjobs-b9d90",
            storageBucket: "microjobs-b9d90.firebasestorage.app",
            messagingSenderId: "1006928193385",
            appId: "1:1006928193385:web:d4b5cc1911abda6ff53ff8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // UI Functions
        window.toggleMenu = () => {
            document.getElementById('side-menu').classList.toggle('-translate-x-full');
            document.getElementById('menu-overlay').classList.toggle('hidden');
        };

        window.switchTab = (tab) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(tab + '-tab').classList.add('active');
            if(tab === 'leaderboard') loadLeaders();
            toggleMenu(); // ক্লোজ সাইডবার ইফ ওপেন
        };

        // Real-time Balance & Auth
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('prof-email').innerText = user.email;
                onSnapshot(doc(db, "users", user.uid), (s) => {
                    if(s.exists()){
                        const d = s.data();
                        const b = (d.balance || 0).toFixed(2);
                        document.getElementById('balance').innerText = b;
                        document.getElementById('nav-balance').innerText = b;
                        if(d.isActive){
                            document.getElementById('act-btn').innerText = "Verified Account";
                            document.getElementById('act-btn').className = "mt-3 px-6 py-2 bg-green-100 text-green-600 text-xs font-bold rounded-full";
                        }
                    }
                });
                loadJobs();
            } else {
                document.getElementById('auth-view').classList.remove('hidden');
                document.getElementById('main-view').classList.add('hidden');
            }
        });

        // জবস লোড করা (আপনার স্ক্রিনশটের ডিজাইনে)
        const loadJobs = () => {
            onSnapshot(collection(db, "jobs"), (snap) => {
                const container = document.getElementById('job-list');
                container.innerHTML = "";
                snap.forEach(d => {
                    const job = d.data();
                    container.innerHTML += `
                        <div class="bg-white p-6 rounded-3xl border shadow-sm relative">
                            <span class="verified-badge absolute top-6 right-6">VERIFIED</span>
                            <h3 class="font-bold text-gray-800 mb-1">${job.title}</h3>
                            <p class="text-[10px] text-gray-400 mb-4">সঠিকভাবে কাজ সম্পন্ন করার নিয়মাবলী ও নির্দেশিকা</p>
                            <div class="flex justify-between items-center">
                                <p class="text-blue-600 font-bold text-xs">পুরস্কার: ৳${job.budget}</p>
                                <button onclick="window.doJob('${d.id}', ${job.budget}, '${job.url}')" class="bg-blue-600 text-white px-6 py-2 rounded-xl text-xs font-bold shadow-md">কাজ শুরু করুন</button>
                            </div>
                        </div>`;
                });
            });
        };

        // ব্যালেন্স অ্যাড করার লজিক (Fix)
        window.doJob = async (id, amount, url) => {
            window.open(url, '_blank');
            if(confirm("আপনি কি কাজটি শেষ করেছেন?")){
                const ref = doc(db, "users", auth.currentUser.uid);
                await updateDoc(ref, { balance: increment(amount) });
                alert("আপনার ব্যালেন্সে ৳" + amount + " যোগ হয়েছে!");
            }
        };

        window.handleLogout = () => signOut(auth).then(() => location.reload());
    </script>
</body>
</html>
