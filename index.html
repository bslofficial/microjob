<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MicroJobs BD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f8fafc; }
        .active-tab { color: #2563eb !important; font-weight: bold; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        #side-menu { transition: transform 0.3s ease-in-out; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="pb-20">

    <header class="bg-blue-600 text-white p-4 shadow-lg sticky top-0 z-50 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <button onclick="window.toggleMenu()" class="text-xl active:scale-90 transition"><i class="fas fa-bars"></i></button>
            <h1 class="font-bold text-lg tracking-tight">MicroJobs BD</h1>
        </div>
        <div class="flex items-center gap-3">
            <div class="bg-blue-500/50 px-3 py-1 rounded-full border border-white/20">
                <span class="text-xs font-bold">৳<span id="nav-balance">0.00</span></span>
            </div>
            <button onclick="window.switchTab('profile')" class="w-9 h-9 bg-white/20 rounded-full flex items-center justify-center border border-white/30">
                <i class="fas fa-user text-sm"></i>
            </button>
        </div>
    </header>

    <div id="menu-overlay" onclick="window.toggleMenu()" class="fixed inset-0 bg-black/50 hidden z-[55]"></div>
    
    <div id="side-menu" class="fixed inset-y-0 left-0 w-72 bg-white shadow-2xl z-[60] transform -translate-x-full overflow-y-auto">
        <div class="p-6 bg-blue-600 text-white">
            <h2 class="text-xl font-bold">Main Menu</h2>
            <p class="text-xs opacity-70 mt-1" id="menu-user-email">Guest User</p>
        </div>
        <nav class="p-4 space-y-1">
            <button onclick="window.switchTab('home')" class="w-full text-left p-4 hover:bg-blue-50 rounded-2xl flex items-center gap-4 transition text-gray-700">
                <i class="fas fa-home text-blue-600"></i> Home
            </button>
            <button onclick="window.switchTab('leaderboard')" class="w-full text-left p-4 hover:bg-blue-50 rounded-2xl flex items-center gap-4 transition text-gray-700">
                <i class="fas fa-trophy text-yellow-500"></i> Leaderboard
            </button>
            <button onclick="window.switchTab('wallet')" class="w-full text-left p-4 hover:bg-blue-50 rounded-2xl flex items-center gap-4 transition text-gray-700">
                <i class="fas fa-wallet text-green-500"></i> Wallet / Deposit
            </button>
            <button onclick="window.switchTab('refer')" class="w-full text-left p-4 hover:bg-blue-50 rounded-2xl flex items-center gap-4 transition text-gray-700">
                <i class="fas fa-gift text-purple-500"></i> Refer & Earn
            </button>
            <hr class="my-4 opacity-50">
            <button onclick="window.handleLogout()" class="w-full text-left p-4 text-red-500 font-bold hover:bg-red-50 rounded-2xl flex items-center gap-4 transition">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </nav>
    </div>

    <main class="max-w-md mx-auto p-4 mt-2">
        <div id="home-tab" class="tab-content active space-y-5">
            <div class="bg-gradient-to-br from-blue-600 to-blue-800 p-8 rounded-[2.5rem] text-white shadow-2xl relative overflow-hidden">
                <div class="relative z-10">
                    <p class="opacity-80 text-xs font-bold uppercase tracking-widest">মোট ব্যালেন্স</p>
                    <h2 class="text-5xl font-extrabold mt-2 tracking-tighter">৳<span id="balance">0.00</span></h2>
                </div>
                <div class="absolute -right-4 -bottom-4 w-32 h-32 bg-white/10 rounded-full blur-2xl"></div>
            </div>

            <h3 class="font-bold text-gray-800 px-1 flex items-center gap-2">
                <span class="w-2 h-6 bg-blue-600 rounded-full"></span> আপনার জন্য কাজ:
            </h3>
            <div id="job-list" class="space-y-4">
                </div>
        </div>

        <div id="wallet-tab" class="tab-content space-y-6">
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100">
                <h2 class="font-bold text-blue-600 flex items-center gap-2 mb-4 uppercase text-xs tracking-wider">
                    <i class="fas fa-plus-circle"></i> Deposit Money
                </h2>
                <div class="bg-blue-50 p-4 rounded-2xl mb-5 text-[11px] border border-blue-100">
                    <p class="text-blue-800 font-medium">বিকাশ/নগদ (Personal): <b>01913932587</b></p>
                </div>
                <input id="d-amount" type="number" placeholder="টাকার পরিমাণ" class="w-full p-4 bg-gray-50 rounded-2xl border mb-3 outline-none focus:border-blue-500 transition-all">
                <input id="d-trx" type="text" placeholder="Transaction ID" class="w-full p-4 bg-gray-50 rounded-2xl border mb-4 outline-none focus:border-blue-500 transition-all">
                <button id="deposit-btn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition">Request Deposit</button>
            </div>

            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100">
                <h2 class="font-bold text-red-600 flex items-center gap-2 mb-4 uppercase text-xs tracking-wider">
                    <i class="fas fa-minus-circle"></i> Withdraw Money
                </h2>
                <input id="w-amount" type="number" placeholder="মিনিমাম ৳৫০০" class="w-full p-4 bg-gray-50 rounded-2xl border mb-3 outline-none focus:border-red-500 transition-all">
                <input id="w-number" type="text" placeholder="বিকাশ/নগদ নম্বর" class="w-full p-4 bg-gray-50 rounded-2xl border mb-4 outline-none focus:border-red-500 transition-all">
                <button id="withdraw-btn" class="w-full bg-red-500 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition">Withdraw Now</button>
            </div>
        </div>

        <div id="leaderboard-tab" class="tab-content">
            <div class="bg-white rounded-[2rem] shadow-sm border overflow-hidden">
                <div class="bg-yellow-500 p-6 text-white text-center">
                    <i class="fas fa-trophy text-4xl mb-2"></i>
                    <h2 class="font-bold">Top 10 Earners</h2>
                </div>
                <div id="leader-list" class="divide-y"></div>
            </div>
        </div>

        <div id="profile-tab" class="tab-content space-y-4">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-sm text-center border">
                <div class="w-24 h-24 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-4xl mx-auto mb-4 border-4 border-white shadow-md">
                    <i class="fas fa-user"></i>
                </div>
                <h2 class="font-bold text-lg text-gray-800" id="prof-email">User Email</h2>
                <button id="status-badge" class="mt-3 px-6 py-2 bg-gray-100 text-gray-500 text-[10px] font-bold rounded-full uppercase tracking-widest">Loading...</button>
            </div>
            <button onclick="window.handleLogout()" class="w-full p-5 bg-white rounded-3xl border text-red-500 font-bold shadow-sm flex items-center justify-center gap-3 active:bg-red-50 transition">
                <i class="fas fa-sign-out-alt"></i> লগআউট
            </button>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-gray-100 flex justify-around py-3 z-50 shadow-[0_-5px_15px_rgba(0,0,0,0.03)]">
        <button onclick="window.switchTab('home')" id="btn-home" class="flex flex-col items-center active-tab">
            <i class="fas fa-home text-lg"></i><span class="text-[9px] mt-1 font-medium">Home</span>
        </button>
        <button onclick="window.switchTab('leaderboard')" id="btn-leaderboard" class="flex flex-col items-center text-gray-400">
            <i class="fas fa-trophy text-lg"></i><span class="text-[9px] mt-1 font-medium">Top 10</span>
        </button>
        <button onclick="window.switchTab('wallet')" id="btn-wallet" class="flex flex-col items-center text-gray-400">
            <i class="fas fa-wallet text-lg"></i><span class="text-[9px] mt-1 font-medium">Wallet</span>
        </button>
        <button onclick="window.switchTab('profile')" id="btn-profile" class="flex flex-col items-center text-gray-400">
            <i class="fas fa-user text-lg"></i><span class="text-[9px] mt-1 font-medium">Profile</span>
        </button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, query, orderBy, limit, updateDoc, addDoc, serverTimestamp, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyANRqR887AfhoW4GxInZHH9J3YYWCfnjs0",
            authDomain: "microjobs-b9d90.firebaseapp.com",
            projectId: "microjobs-b9d90",
            storageBucket: "microjobs-b9d90.firebasestorage.app",
            messagingSenderId: "1006928193385",
            appId: "1:1006928193385:web:d4b5cc1911abda6ff53ff8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // UI Helpers
        window.toggleMenu = () => {
            const menu = document.getElementById('side-menu');
            const overlay = document.getElementById('menu-overlay');
            const isOpen = menu.style.transform === 'translateX(0px)';
            menu.style.transform = isOpen ? 'translateX(-100%)' : 'translateX(0px)';
            overlay.classList.toggle('hidden');
        };

        window.switchTab = (tab) => {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(tab + '-tab').classList.add('active');
            document.querySelectorAll('nav button').forEach(el => el.classList.replace('active-tab', 'text-gray-400'));
            const btn = document.getElementById('btn-' + tab);
            if(btn) btn.classList.replace('text-gray-400', 'active-tab');
            if(tab === 'leaderboard') loadLeaderboard();
            if(document.getElementById('side-menu').style.transform === 'translateX(0px)') window.toggleMenu();
        };

        // Real-time Data
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('prof-email').innerText = user.email;
                document.getElementById('menu-user-email').innerText = user.email;
                onSnapshot(doc(db, "users", user.uid), (s) => {
                    if(s.exists()){
                        const d = s.data();
                        const b = (d.balance || 0).toFixed(2);
                        document.getElementById('balance').innerText = b;
                        document.getElementById('nav-balance').innerText = b;
                        const badge = document.getElementById('status-badge');
                        badge.innerText = d.isActive ? "Verified" : "Not Active";
                        badge.className = d.isActive ? "mt-3 px-6 py-2 bg-green-100 text-green-600 text-[10px] font-bold rounded-full uppercase" : "mt-3 px-6 py-2 bg-red-100 text-red-600 text-[10px] font-bold rounded-full uppercase";
                    }
                });
                loadJobs();
            } else {
                location.href = "login.html"; // লগইন না থাকলে সরিয়ে দিবে
            }
        });

        // Balance Work Logic
        window.completeJob = async (jobId, budget, url) => {
            window.open(url, '_blank');
            if(confirm("কাজটি সম্পন্ন করেছেন কি? পেমেন্ট যুক্ত করতে 'OK' দিন।")) {
                const userRef = doc(db, "users", auth.currentUser.uid);
                await updateDoc(userRef, { balance: increment(budget) });
                alert("সাফল্যের সাথে ৳" + budget + " যোগ হয়েছে!");
            }
        };

        const loadJobs = () => {
            onSnapshot(collection(db, "jobs"), (snap) => {
                const container = document.getElementById('job-list');
                container.innerHTML = "";
                snap.forEach(d => {
                    const job = d.data();
                    if(job.status === "active") {
                        container.innerHTML += `
                            <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 flex justify-between items-center transition active:scale-95">
                                <div>
                                    <h4 class="font-bold text-gray-800 text-sm">${job.title}</h4>
                                    <p class="text-blue-600 font-bold text-xs mt-1">পুরস্কার: ৳${job.budget}</p>
                                </div>
                                <button onclick="window.completeJob('${d.id}', ${job.budget}, '${job.url}')" class="bg-blue-600 text-white px-5 py-2.5 rounded-2xl text-[10px] font-bold shadow-md">কাজ শুরু করুন</button>
                            </div>`;
                    }
                });
            });
        };

        // Withdraw (Min 500)
        document.getElementById('withdraw-btn').onclick = async () => {
            const amount = Number(document.getElementById('w-amount').value);
            const number = document.getElementById('w-number').value.trim();
            if(amount < 500) return alert("মিনিমাম ৫০০ টাকা হতে হবে।");
            if(!number) return alert("নম্বর দিন।");
            
            const userRef = doc(db, "users", auth.currentUser.uid);
            await addDoc(collection(db, "withdraws"), { uid: auth.currentUser.uid, amount, number, status: "pending", createdAt: serverTimestamp() });
            await updateDoc(userRef, { balance: increment(-amount) });
            alert("উইথড্র রিকোয়েস্ট পাঠানো হয়েছে!");
        };

        const loadLeaderboard = () => {
            const q = query(collection(db, "users"), orderBy("balance", "desc"), limit(10));
            onSnapshot(q, (snap) => {
                const list = document.getElementById('leader-list');
                list.innerHTML = "";
                let rank = 1;
                snap.forEach(d => {
                    const u = d.data();
                    list.innerHTML += `<div class="p-4 flex justify-between items-center">
                        <span class="text-sm font-medium text-gray-600">${rank++}. ${u.email.split('@')[0]}</span>
                        <span class="font-bold text-blue-600 text-sm">৳${(u.balance || 0).toFixed(2)}</span>
                    </div>`;
                });
            });
        };

        window.handleLogout = () => signOut(auth).then(() => location.reload());
    </script>
</body>
</html>
