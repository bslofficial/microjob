<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MicroJobs BD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .active-tab { color: #2563eb !important; font-weight: bold; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        #side-menu { transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-slate-50 pb-24 overflow-x-hidden">

    <header class="bg-blue-600 text-white p-4 shadow-lg sticky top-0 z-50 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <button onclick="window.toggleMenu()" class="text-xl"><i class="fas fa-bars"></i></button>
            <h1 class="font-bold text-lg">MicroJobs BD</h1>
        </div>
        <div class="flex items-center gap-2">
            <span class="text-[10px] bg-blue-500 px-2 py-1 rounded-lg font-bold">৳<span id="nav-balance">0.00</span></span>
            <button onclick="window.switchTab('profile')" class="w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center border border-blue-400">
                <i class="fas fa-user text-xs"></i>
            </button>
        </div>
    </header>

    <div id="side-menu" class="fixed inset-y-0 left-0 w-64 bg-white shadow-2xl z-[60] transform -translate-x-full">
        <nav class="p-4 pt-10 space-y-1 text-gray-700">
            <button onclick="window.switchTab('home')" class="w-full text-left p-3 hover:bg-blue-50 rounded-xl flex items-center gap-3 text-sm font-medium">
                <i class="fas fa-home w-5 text-blue-600"></i> Home
            </button>
            <button onclick="window.switchTab('leaderboard')" class="w-full text-left p-3 hover:bg-blue-50 rounded-xl flex items-center gap-3 text-sm font-medium">
                <i class="fas fa-trophy w-5 text-yellow-500"></i> Leaderboard
            </button>
            <button onclick="window.switchTab('wallet')" class="w-full text-left p-3 hover:bg-blue-50 rounded-xl flex items-center gap-3 text-sm font-medium">
                <i class="fas fa-wallet w-5 text-blue-600"></i> Wallet / Deposit
            </button>
            <button onclick="window.switchTab('refer')" class="w-full text-left p-3 hover:bg-blue-50 rounded-xl flex items-center gap-3 text-sm font-medium">
                <i class="fas fa-gift w-5 text-purple-600"></i> Refer & Earn
            </button>
            <button onclick="window.switchTab('profile')" class="w-full text-left p-3 hover:bg-blue-50 rounded-xl flex items-center gap-3 text-sm font-medium">
                <i class="fas fa-user-circle w-5 text-blue-500"></i> My Profile
            </button>
            <hr class="my-4">
            <button onclick="window.handleLogout()" class="w-full text-left p-3 text-red-500 font-bold hover:bg-red-50 rounded-xl flex items-center gap-3 text-sm">
                <i class="fas fa-sign-out-alt w-5"></i> Logout
            </button>
        </nav>
    </div>
    <div id="menu-overlay" onclick="window.toggleMenu()" class="fixed inset-0 bg-black/50 hidden z-[55]"></div>

    <main class="max-w-md mx-auto p-4">
        <div id="auth-view" class="bg-white p-8 rounded-3xl shadow-xl mt-10">
            <h2 class="text-xl font-bold mb-6 text-center text-blue-600">Login / Signup</h2>
            <input id="email" type="email" placeholder="ইমেইল" class="w-full border p-4 rounded-2xl mb-3 outline-none bg-gray-50 focus:border-blue-500 text-sm">
            <input id="password" type="password" placeholder="পাসওয়ার্ড" class="w-full border p-4 rounded-2xl mb-5 outline-none bg-gray-50 focus:border-blue-500 text-sm">
            <button id="login-btn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold mb-3 text-sm">Login</button>
            <button id="signup-btn" class="w-full text-blue-600 font-bold py-2 text-sm text-center block">Create Account</button>
        </div>

        <div id="main-view" class="hidden">
            <div id="home-tab" class="tab-content active">
                <div class="bg-gradient-to-br from-blue-600 to-blue-800 p-6 rounded-3xl text-white shadow-xl mb-6">
                    <p class="opacity-80 text-[10px] font-bold uppercase">ব্যালেন্স</p>
                    <h2 class="text-4xl font-extrabold mt-1">৳<span id="balance">0.00</span></h2>
                </div>
                <h3 class="font-bold text-gray-700 mb-4 px-1">আপনার জন্য কাজ:</h3>
                <div id="job-list" class="space-y-4"></div>
            </div>

            <div id="leaderboard-tab" class="tab-content">
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2"><i class="fas fa-trophy text-yellow-500"></i> সেরা ১০ উপার্জনকারী</h2>
                <div id="leader-list" class="bg-white rounded-3xl shadow-sm border overflow-hidden divide-y"></div>
            </div>

            <div id="wallet-tab" class="tab-content space-y-4">
                <div class="bg-white p-5 rounded-3xl shadow-sm border border-blue-100">
                    <h2 class="font-bold text-blue-600 text-sm mb-3 uppercase flex items-center gap-2"><i class="fas fa-plus-circle"></i> Deposit</h2>
                    <input id="d-amount" type="number" placeholder="টাকার পরিমাণ" class="w-full p-3 bg-gray-50 rounded-xl mb-3 outline-none border">
                    <input id="d-trx" type="text" placeholder="TrxID" class="w-full p-3 bg-gray-50 rounded-xl mb-4 outline-none border">
                    <button id="deposit-btn" class="w-full bg-blue-600 text-white py-3.5 rounded-xl font-bold">ডিপোজিট রিকোয়েস্ট পাঠান</button>
                </div>
            </div>

            <div id="profile-tab" class="tab-content space-y-4">
                <div class="bg-white p-6 rounded-3xl shadow-sm text-center border">
                    <h2 class="font-bold text-gray-800" id="prof-email-display">Loading...</h2>
                    <button onclick="window.activateAccount()" id="activate-btn-prof" class="mt-3 px-4 py-1.5 bg-red-100 text-red-600 text-[10px] font-bold rounded-full">Activate Account (৳১০০)</button>
                </div>
                <button onclick="window.handleLogout()" class="w-full p-4 bg-white rounded-2xl border text-red-500 font-bold">লগআউট</button>
            </div>
        </div>
    </main>

    <nav id="bottom-nav" class="hidden fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around py-3 z-50">
        <button onclick="window.switchTab('home')" id="btn-home" class="flex flex-col items-center active-tab"><i class="fas fa-home"></i><span class="text-[9px]">Home</span></button>
        <button onclick="window.switchTab('wallet')" id="btn-wallet" class="flex flex-col items-center text-gray-400"><i class="fas fa-wallet"></i><span class="text-[9px]">Wallet</span></button>
        <button onclick="window.switchTab('profile')" id="btn-profile" class="flex flex-col items-center text-gray-400"><i class="fas fa-user"></i><span class="text-[9px]">Profile</span></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, query, orderBy, limit, setDoc, getDoc, updateDoc, addDoc, serverTimestamp, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyANRqR887AfhoW4GxInZHH9J3YYWCfnjs0",
            authDomain: "microjobs-b9d90.firebaseapp.com",
            projectId: "microjobs-b9d90",
            storageBucket: "microjobs-b9d90.firebasestorage.app",
            messagingSenderId: "1006928193385",
            appId: "1:1006928193385:web:d4b5cc1911abda6ff53ff8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // --- UI Logic ---
        window.toggleMenu = () => {
            const menu = document.getElementById('side-menu');
            menu.style.transform = (menu.style.transform === 'translateX(0px)') ? 'translateX(-100%)' : 'translateX(0px)';
            document.getElementById('menu-overlay').classList.toggle('hidden');
        };

        window.switchTab = (tab) => {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(tab + '-tab').classList.add('active');
            if(tab === 'leaderboard') loadLeaderboard();
        };

        // --- Auth & Real-time Balance ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-view').classList.add('hidden');
                document.getElementById('main-view').classList.remove('hidden');
                document.getElementById('bottom-nav').classList.remove('hidden');
                document.getElementById('prof-email-display').innerText = user.email;

                // REAL-TIME BALANCE UPDATE FIX
                onSnapshot(doc(db, "users", user.uid), (s) => {
                    if(s.exists()){
                        const d = s.data();
                        const val = (d.balance || 0).toFixed(2);
                        document.getElementById('balance').innerText = val;
                        document.getElementById('nav-balance').innerText = val;
                        if(d.isActive) {
                            const b = document.getElementById('activate-btn-prof');
                            b.innerText = "Verified Account";
                            b.className = "mt-3 px-4 py-1.5 bg-green-100 text-green-600 text-[10px] font-bold rounded-full";
                        }
                    }
                });
                loadJobs();
            } else {
                document.getElementById('auth-view').classList.remove('hidden');
                document.getElementById('main-view').classList.add('hidden');
            }
        });

        // --- Complete Job & Update Balance ---
        window.completeJob = async (id, budget, url) => {
            window.open(url, '_blank');
            if(confirm("আপনি কি কাজটি সম্পন্ন করেছেন? তবেই টাকা যোগ হবে।")) {
                const userRef = doc(db, "users", auth.currentUser.uid);
                await updateDoc(userRef, { balance: increment(budget) });
                alert("সাফল্যের সাথে ৳" + budget + " যোগ হয়েছে!");
            }
        };

        const loadJobs = () => {
            onSnapshot(collection(db, "jobs"), (snap) => {
                const container = document.getElementById('job-list');
                container.innerHTML = "";
                snap.forEach(d => {
                    const job = d.data();
                    container.innerHTML += `
                        <div class="bg-white p-5 rounded-3xl shadow-sm border mb-3">
                            <h3 class="font-bold text-sm text-gray-800">${job.title}</h3>
                            <div class="flex justify-between items-center mt-3">
                                <p class="text-[11px] text-blue-600 font-bold">পুরস্কার: ৳${job.budget}</p>
                                <button onclick="window.completeJob('${d.id}', ${job.budget}, '${job.url}')" class="bg-blue-600 text-white px-4 py-1.5 rounded-xl text-[10px] font-bold">কাজ শুরু করুন</button>
                            </div>
                        </div>`;
                });
            });
        };

        // --- Deposit, Login, Signup & Logout Actions ---
        document.getElementById('login-btn').onclick = () => {
            signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value).catch(e => alert(e.message));
        };

        document.getElementById('signup-btn').onclick = () => {
            createUserWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value).then(async (cred) => {
                await setDoc(doc(db, "users", cred.user.uid), { email: cred.user.email, balance: 0, isActive: false, createdAt: serverTimestamp() });
            }).catch(e => alert(e.message));
        };

        window.handleLogout = () => signOut(auth).then(() => location.reload());
    </script>
</body>
</html>
