<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MicroJobs BD - Earn Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <nav class="bg-blue-800 p-4 text-white flex justify-between items-center shadow-lg">
        <h1 class="font-bold text-xl tracking-tight">MicroJobs BD</h1>
        <div id="auth-info" class="hidden flex items-center gap-4">
            <span id="user-display-email" class="text-xs bg-blue-900 px-2 py-1 rounded"></span>
            <button id="logout-btn" class="bg-red-500 hover:bg-red-600 px-3 py-1 rounded text-xs transition">Logout</button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4">
        <div id="auth-view" class="bg-white p-8 rounded-2xl shadow-xl mt-10 max-w-sm mx-auto border border-gray-200">
            <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">স্বাগতম!</h2>
            <div class="space-y-4">
                <input id="email" type="email" placeholder="আপনার ইমেইল" class="w-full border p-3 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                <input id="password" type="password" placeholder="পাসওয়ার্ড" class="w-full border p-3 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                <button id="login-btn" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition">Login</button>
                <div class="text-center text-gray-400 text-sm">অথবা</div>
                <button id="signup-btn" class="w-full border-2 border-blue-600 text-blue-600 py-2.5 rounded-lg font-bold hover:bg-blue-50 transition">Sign Up</button>
            </div>
        </div>

        <div id="main-view" class="hidden animate-fade-in">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                <div class="bg-gradient-to-br from-blue-700 to-blue-500 p-6 rounded-2xl text-white shadow-lg">
                    <p class="opacity-80">বর্তমান ব্যালেন্স</p>
                    <h2 class="text-4xl font-bold mt-1">৳<span id="balance">0.00</span></h2>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-md border-l-8 border-orange-500">
                    <h3 class="font-bold text-gray-700 mb-3">টাকা উত্তোলন (Withdraw)</h3>
                    <input id="withdraw-amount" type="number" placeholder="পরিমাণ" class="border p-2 rounded-lg w-full mb-2">
                    <input id="bkash-number" type="text" placeholder="বিকাশ/নগদ নম্বর" class="border p-2 rounded-lg w-full mb-3">
                    <button id="withdraw-btn" class="w-full bg-orange-500 text-white py-2.5 rounded-lg font-bold hover:bg-orange-600 transition">রিকোয়েস্ট পাঠান</button>
                </div>
            </div>

            <h2 class="text-xl font-bold mb-5 text-gray-800 border-b pb-2">উপলব্ধ কাজসমূহ</h2>
            <div id="job-list" class="grid gap-4"></div>
        </div>
    </main>

    <div id="proof-modal" class="fixed inset-0 bg-black bg-opacity-70 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white p-6 rounded-2xl max-w-md w-full shadow-2xl">
            <h3 class="text-xl font-bold mb-2">কাজের প্রমাণ জমা দিন</h3>
            <p id="modal-job-title" class="text-blue-600 font-semibold mb-4 text-sm"></p>
            <div class="space-y-4">
                <div>
                    <label class="block mb-1 text-xs font-bold text-gray-500 uppercase">স্ক্রিনশট আপলোড:</label>
                    <input type="file" id="imageInput" accept="image/*" class="w-full border p-2 rounded-lg bg-gray-50">
                </div>
                <textarea id="proof-note" placeholder="অতিরিক্ত কোনো তথ্য বা ট্রানজেকশন আইডি (ঐচ্ছিক)" class="w-full border p-3 rounded-lg h-24 text-sm"></textarea>
                <div class="flex justify-end gap-3 pt-2">
                    <button onclick="document.getElementById('proof-modal').classList.add('hidden')" class="px-5 py-2 bg-gray-100 text-gray-600 rounded-lg font-semibold">বাতিল</button>
                    <button id="submit-proof-btn" class="px-6 py-2 bg-green-600 text-white rounded-lg font-bold hover:bg-green-700 transition">জমা দিন</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
