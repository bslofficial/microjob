<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MicroJobs BD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .active-tab { color: #2563eb !important; font-weight: bold; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        #side-menu { transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-slate-50 pb-20 overflow-x-hidden">

    <header class="bg-blue-600 text-white p-4 shadow-lg sticky top-0 z-50 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <button onclick="window.toggleMenu()" class="text-xl"><i class="fas fa-bars"></i></button>
            <h1 class="font-bold text-lg">MicroJobs BD</h1>
        </div>
        <button onclick="window.toggleMenu()" class="w-10 h-10 bg-blue-500 rounded-full flex items-center justify-center border-2 border-blue-400">
            <i class="fas fa-user text-white"></i>
        </button>
    </header>

    <div id="side-menu" class="fixed inset-y-0 left-0 w-64 bg-white shadow-2xl z-[60] transform -translate-x-full">
        <div class="p-6 bg-blue-600 text-white">
            <div class="w-14 h-14 bg-white/20 rounded-full flex items-center justify-center text-xl mb-3">
                <i class="fas fa-user-circle"></i>
            </div>
            <p id="user-email-display" class="text-xs truncate">স্বাগতম!</p>
            <p id="account-status" class="text-[10px] font-bold mt-1 px-2 py-0.5 bg-red-500 rounded-full inline-block">Not Active</p>
        </div>
        <nav class="p-4 space-y-1">
            <button onclick="window.switchTab('home')" class="w-full text-left p-3 hover:bg-blue-50 rounded-xl flex items-center gap-3 text-sm text-gray-700"><i class="fas fa-home w-5"></i> Home</button>
            <button onclick="window.switchTab('post-job')" class="w-full text-left p-3 hover:bg-blue-50 rounded-xl flex items-center gap-3 text-sm text-gray-700"><i class="fas fa-plus-circle w-5"></i> Post Job</button>
            <button onclick="window.switchTab('wallet')" class="w-full text-left p-3 hover:bg-blue-50 rounded-xl flex items-center gap-3 text-sm text-gray-700"><i class="fas fa-wallet w-5"></i> Wallet</button>
            <hr class="my-2">
            <button onclick="window.switchTab('refer')" class="w-full text-left p-3 hover:bg-blue-50 rounded-xl flex items-center gap-3 text-sm text-gray-700"><i class="fas fa-user-plus w-5"></i> Refer & Earn</button>
            <button onclick="window.activateAccount()" class="w-full text-left p-3 text-blue-600 font-bold hover:bg-blue-50 rounded-xl flex items-center gap-3 text-sm"><i class="fas fa-check-circle w-5"></i> Activate (৳১০০)</button>
            <hr class="my-2">
            <button id="logout-btn" class="w-full text-left p-3 text-red-500 font-bold hover:bg-red-50 rounded-xl flex items-center gap-3 text-sm"><i class="fas fa-sign-out-alt w-5"></i> Logout</button>
        </nav>
    </div>
    <div id="menu-overlay" onclick="window.toggleMenu()" class="fixed inset-0 bg-black/50 hidden z-[55]"></div>

    <main class="max-w-md mx-auto p-4">
        <div id="auth-view" class="bg-white p-8 rounded-3xl shadow-xl mt-10">
            <h2 class="text-xl font-bold mb-6 text-center text-blue-600">লগইন / সাইন-আপ</h2>
            <input id="email" type="email" placeholder="ইমেইল" class="w-full border p-4 rounded-2xl mb-3 outline-none bg-gray-50 focus:border-blue-500">
            <input id="password" type="password" placeholder="পাসওয়ার্ড" class="w-full border p-4 rounded-2xl mb-5 outline-none bg-gray-50 focus:border-blue-500">
            <button id="login-btn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold">Login</button>
            <button id="signup-btn" class="w-full text-blue-600 font-bold py-3 mt-2">Create Account</button>
        </div>

        <div id="main-view" class="hidden">
            <div id="home-tab" class="tab-content active">
                <div class="bg-gradient-to-br from-blue-600 to-blue-800 p-6 rounded-3xl text-white shadow-xl mb-6">
                    <p class="opacity-80 text-[10px] font-bold">আপনার ব্যালেন্স</p>
                    <h2 class="text-4xl font-extrabold mt-1">৳<span id="balance">0.00</span></h2>
                </div>
                <div id="job-list" class="space-y-4"></div>
            </div>

            <div id="wallet-tab" class="tab-content space-y-4">
                <div class="bg-white p-6 rounded-3xl shadow-md border border-green-50">
                    <h2 class="font-bold text-green-600 mb-2 flex items-center gap-2"><i class="fas fa-plus-circle"></i> ডিপোজিট করুন</h2>
                    <div class="bg-blue-50 p-3 rounded-xl mb-4 text-center">
                        <p class="text-[10px] text-blue-400 font-bold uppercase">বিকাশ/নগদ (Personal)</p>
                        <p class="text-lg font-black text-blue-700">01913932587</p>
                    </div>
                    <input id="d-amount" type="number" placeholder="পরিমাণ" class="w-full p-3 bg-gray-50 rounded-xl mb-2 outline-none">
                    <input id="d-trx" type="text" placeholder="Transaction ID" class="w-full p-3 bg-gray-50 rounded-xl mb-4 outline-none">
                    <button id="deposit-btn" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold">জমা রিকোয়েস্ট</button>
                </div>

                <div class="bg-white p-6 rounded-3xl shadow-md border border-orange-50">
                    <h2 class="font-bold text-orange-600 mb-4 flex items-center gap-2"><i class="fas fa-hand-holding-usd"></i> উইথড্র করুন</h2>
                    <input id="w-amount" type="number" placeholder="উত্তোলনের পরিমাণ" class="w-full p-3 bg-gray-50 rounded-xl mb-2 outline-none">
                    <select id="w-method" class="w-full p-3 bg-gray-50 rounded-xl mb-2 outline-none text-sm text-gray-600">
                        <option value="Bkash">বিকাশ</option>
                        <option value="Nagad">নগদ</option>
                    </select>
                    <input id="w-number" type="text" placeholder="বিকাশ/নগদ নম্বর" class="w-full p-3 bg-gray-50 rounded-xl mb-4 outline-none">
                    <button id="withdraw-btn" class="w-full bg-orange-600 text-white py-3 rounded-xl font-bold">উইথড্র রিকোয়েস্ট</button>
                    <p class="text-[10px] text-gray-400 mt-2 text-center">ন্যূনতম উইথড্র ৳৫০</p>
                </div>
            </div>

            <div id="post-job-tab" class="tab-content">
                <div id="post-job-form" class="bg-white p-6 rounded-3xl shadow-md border hidden">
                    <h2 class="text-lg font-bold mb-4 text-blue-700">জব পোস্ট করুন</h2>
                    <input id="u-job-title" type="text" placeholder="টাইটেল" class="w-full p-4 bg-gray-50 rounded-2xl mb-3 outline-none">
                    <input id="u-job-url" type="url" placeholder="লিঙ্ক" class="w-full p-4 bg-gray-50 rounded-2xl mb-3 outline-none">
                    <textarea id="u-job-desc" placeholder="নির্দেশনা..." class="w-full p-4 bg-gray-50 rounded-2xl mb-3 outline-none h-24"></textarea>
                    <input id="u-job-budget" type="number" placeholder="বাজেট (৳)" class="w-full p-4 bg-gray-50 rounded-2xl mb-4 outline-none">
                    <button id="u-post-btn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold">জমা দিন</button>
                </div>
                <div id="activation-warning" class="text-center py-20">
                    <i class="fas fa-lock text-5xl text-gray-200 mb-4"></i>
                    <p class="text-gray-500">জব পোস্ট করতে অ্যাকাউন্ট এক্টিভেট করুন।</p>
                </div>
            </div>
        </div>
    </main>

    <nav id="bottom-nav" class="hidden fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around py-3 z-50">
        <button onclick="window.switchTab('home')" id="btn-home" class="flex flex-col items-center active-tab">
            <i class="fas fa-home text-lg"></i>
            <span class="text-[10px] mt-1">Home</span>
        </button>
        <button onclick="window.switchTab('post-job')" id="btn-post-job" class="flex flex-col items-center text-gray-300">
            <i class="fas fa-plus-circle text-lg"></i>
            <span class="text-[10px] mt-1">Post Job</span>
        </button>
        <button onclick="window.switchTab('wallet')" id="btn-wallet" class="flex flex-col items-center text-gray-300">
            <i class="fas fa-wallet text-lg"></i>
            <span class="text-[10px] mt-1">Wallet</span>
        </button>
    </nav>

    <script type="module" src="app.js"></script>
</body>
</html>
