<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MicroJobs BD - Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .active-tab { color: #2563eb !important; font-weight: bold; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        #side-menu { transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-slate-50 pb-24 overflow-x-hidden">

    <header class="bg-blue-600 text-white p-4 shadow-lg sticky top-0 z-50 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <button onclick="window.toggleMenu()" class="text-xl"><i class="fas fa-bars"></i></button>
            <h1 class="font-bold text-lg">MicroJobs BD</h1>
        </div>
        <div class="flex items-center gap-2">
            <span class="text-[10px] bg-blue-500 px-2 py-1 rounded-lg">৳<span id="nav-balance">0.00</span></span>
        </div>
    </header>

    <div id="side-menu" class="fixed inset-y-0 left-0 w-64 bg-white shadow-2xl z-[60] transform -translate-x-full">
        <div class="p-6 bg-blue-600 text-white text-center">
            <div class="w-14 h-14 bg-white/20 rounded-full flex items-center justify-center text-xl mb-3 mx-auto"><i class="fas fa-user-circle"></i></div>
            <p id="user-email-display" class="text-xs truncate font-bold">স্বাগতম!</p>
            <p id="account-status" class="text-[9px] font-bold mt-1 px-2 py-0.5 bg-red-500 rounded-full inline-block">Not Active</p>
        </div>
        <nav class="p-4 space-y-1 text-gray-700">
            <button onclick="window.switchTab('home')" class="w-full text-left p-3 hover:bg-blue-50 rounded-xl flex items-center gap-3 text-sm"><i class="fas fa-home w-5"></i> Home</button>
            <button onclick="window.dailyBonus()" class="w-full text-left p-3 hover:bg-blue-50 rounded-xl flex items-center gap-3 text-sm text-orange-600 font-bold"><i class="fas fa-coins w-5"></i> Daily Bonus</button>
            <button onclick="window.switchTab('wallet')" class="w-full text-left p-3 hover:bg-blue-50 rounded-xl flex items-center gap-3 text-sm"><i class="fas fa-wallet w-5"></i> Wallet</button>
            <button id="logout-btn" class="w-full text-left p-3 text-red-500 font-bold hover:bg-red-50 rounded-xl flex items-center gap-3 text-sm"><i class="fas fa-sign-out-alt w-5"></i> Logout</button>
        </nav>
    </div>
    <div id="menu-overlay" onclick="window.toggleMenu()" class="fixed inset-0 bg-black/50 hidden z-[55]"></div>

    <main class="max-w-md mx-auto p-4">
        <div id="auth-view" class="bg-white p-8 rounded-3xl shadow-xl mt-10">
            <h2 class="text-xl font-bold mb-6 text-center text-blue-600">Login / Signup</h2>
            <input id="email" type="email" placeholder="ইমেইল" class="w-full border p-4 rounded-2xl mb-3 outline-none bg-gray-50 focus:border-blue-500 text-sm">
            <input id="password" type="password" placeholder="পাসওয়ার্ড" class="w-full border p-4 rounded-2xl mb-5 outline-none bg-gray-50 focus:border-blue-500 text-sm">
            <button id="login-btn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold mb-3">Login</button>
            <button id="signup-btn" class="w-full text-blue-600 font-bold py-2 text-sm">Create Account</button>
        </div>

        <div id="main-view" class="hidden">
            <div id="home-tab" class="tab-content active">
                <div class="bg-gradient-to-br from-blue-600 to-blue-800 p-6 rounded-3xl text-white shadow-xl mb-6">
                    <p class="opacity-80 text-[10px] font-bold uppercase">বর্তমান ব্যালেন্স</p>
                    <h2 class="text-4xl font-extrabold mt-1">৳<span id="balance">0.00</span></h2>
                </div>
                
                <div id="proof-box" class="bg-white p-5 rounded-3xl border-2 border-blue-500 shadow-md mb-6 hidden">
                    <h3 class="font-bold text-sm text-blue-600 mb-2">কাজের প্রমাণ জমা দিন</h3>
                    <p id="submitting-job-title" class="text-[10px] text-gray-500 mb-3"></p>
                    <input id="proof-text" type="text" placeholder="আপনার ইউজারনেম বা আইডি লিখুন" class="w-full p-3 bg-gray-50 border rounded-xl mb-3 text-xs outline-none">
                    <div class="flex gap-2">
                        <button onclick="window.submitProof()" class="flex-1 bg-blue-600 text-white py-2 rounded-xl text-xs font-bold">জমা দিন</button>
                        <button onclick="document.getElementById('proof-box').classList.add('hidden')" class="bg-gray-200 px-4 py-2 rounded-xl text-xs">বাতিল</button>
                    </div>
                </div>

                <div id="job-list" class="space-y-4"></div>
            </div>

            <div id="wallet-tab" class="tab-content space-y-4">
                <div class="bg-white p-5 rounded-3xl shadow-sm border border-green-100">
                    <h2 class="font-bold text-green-600 text-sm mb-3">ডিপোজিট (01913932587)</h2>
                    <input id="d-amount" type="number" placeholder="পরিমাণ" class="w-full p-3 bg-gray-50 rounded-xl mb-2 text-sm border">
                    <input id="d-trx" type="text" placeholder="Transaction ID" class="w-full p-3 bg-gray-50 rounded-xl mb-3 text-sm border">
                    <button id="deposit-btn" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold">জমা রিকোয়েস্ট</button>
                </div>
            </div>
            
            <div id="profile-tab" class="tab-content space-y-4">
                <div class="bg-white p-6 rounded-3xl shadow-sm text-center border">
                    <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-2xl mx-auto mb-2"><i class="fas fa-user"></i></div>
                    <h2 class="font-bold text-gray-800 text-sm" id="prof-email-display">User Email</h2>
                    <button onclick="window.activateAccount()" id="activate-btn-prof" class="mt-2 px-4 py-1 bg-red-100 text-red-600 text-[9px] font-bold rounded-full">Activate Account (৳১০০)</button>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-white p-4 rounded-2xl border text-center">
                        <p class="text-[9px] text-gray-400 uppercase">মোট রেফার</p>
                        <h4 id="stat-refers" class="text-lg font-bold text-blue-600">0</h4>
                    </div>
                    <div class="bg-white p-4 rounded-2xl border text-center">
                        <p class="text-[9px] text-gray-400 uppercase">ব্যালেন্স</p>
                        <h4 id="stat-balance" class="text-lg font-bold text-green-600">৳০</h4>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <nav id="bottom-nav" class="hidden fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around py-3 z-50">
        <button onclick="window.switchTab('home')" id="btn-home" class="flex flex-col items-center active-tab"><i class="fas fa-home"></i><span class="text-[9px] mt-1">Home</span></button>
        <button onclick="window.switchTab('wallet')" id="btn-wallet" class="flex flex-col items-center text-gray-400"><i class="fas fa-wallet"></i><span class="text-[9px] mt-1">Wallet</span></button>
        <button onclick="window.switchTab('profile')" id="btn-profile" class="flex flex-col items-center text-gray-400"><i class="fas fa-user"></i><span class="text-[9px] mt-1">Profile</span></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, increment, addDoc, collection, onSnapshot, serverTimestamp, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyANRqR887AfhoW4GxInZHH9J3YYWCfnjs0",
            authDomain: "microjobs-b9d90.firebaseapp.com",
            projectId: "microjobs-b9d90",
            storageBucket: "microjobs-b9d90.firebasestorage.app",
            messagingSenderId: "1006928193385",
            appId: "1:1006928193385:web:d4b5cc1911abda6ff53ff8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentSubmittingJobId = null;

        // UI Helpers
        window.toggleMenu = () => {
            const menu = document.getElementById('side-menu');
            const overlay = document.getElementById('menu-overlay');
            const isOpen = menu.style.transform === 'translateX(0px)';
            menu.style.transform = isOpen ? 'translateX(-100%)' : 'translateX(0px)';
            overlay.classList.toggle('hidden');
        };

        window.switchTab = (tab) => {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(tab + '-tab').classList.add('active');
            document.querySelectorAll('#bottom-nav button').forEach(el => { el.classList.remove('active-tab'); el.classList.add('text-gray-400'); });
            const btn = document.getElementById('btn-' + tab); if(btn) btn.classList.add('active-tab');
            if(document.getElementById('side-menu').style.transform === 'translateX(0px)') window.toggleMenu();
        };

        // --- NEW FEATURE: Daily Bonus ---
        window.dailyBonus = async () => {
            const userRef = doc(db, "users", auth.currentUser.uid);
            const userSnap = await getDoc(userRef);
            const lastBonus = userSnap.data().lastBonusDate || 0;
            const today = new Date().toDateString();

            if (lastBonus === today) {
                alert("আপনি আজ ইতিমধ্যে বোনাস নিয়েছেন!");
            } else {
                await updateDoc(userRef, {
                    balance: increment(1.00), // প্রতিদিন ১ টাকা বোনাস
                    lastBonusDate: today
                });
                alert("অভিনন্দন! আপনি ১ টাকা ডেইলি বোনাস পেয়েছেন।");
            }
        };

        // --- NEW FEATURE: Proof Submission ---
        window.openProofBox = (jobId, jobTitle) => {
            currentSubmittingJobId = jobId;
            document.getElementById('submitting-job-title').innerText = "Job: " + jobTitle;
            document.getElementById('proof-box').classList.remove('hidden');
            window.scrollTo(0, 0);
        };

        window.submitProof = async () => {
            const proof = document.getElementById('proof-text').value;
            if(!proof) return alert("প্রমাণ হিসেবে কিছু লিখুন");

            await addDoc(collection(db, "proofs"), {
                uid: auth.currentUser.uid,
                email: auth.currentUser.email,
                jobId: currentSubmittingJobId,
                proofText: proof,
                status: "pending",
                createdAt: serverTimestamp()
            });

            alert("প্রমাণ জমা হয়েছে! অ্যাডমিন চেক করে ব্যালেন্স যোগ করবেন।");
            document.getElementById('proof-box').classList.add('hidden');
            document.getElementById('proof-text').value = "";
        };

        // Load Jobs with Submit Button
        const loadJobs = () => {
            onSnapshot(collection(db, "jobs"), (snap) => {
                const container = document.getElementById('job-list');
                container.innerHTML = "";
                snap.forEach(d => {
                    const job = d.data();
                    if(job.status === "active") {
                        container.innerHTML += `
                            <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 mb-3">
                                <h3 class="font-bold text-sm text-gray-800">${job.title}</h3>
                                <p class="text-[10px] text-gray-500 mt-1">${job.description || ''}</p>
                                <div class="flex justify-between items-center mt-3">
                                    <p class="text-[11px] text-blue-600 font-bold">বাজেট: ৳${job.budget}</p>
                                    <div class="flex gap-2">
                                        <a href="${job.url}" target="_blank" class="bg-gray-100 text-blue-600 px-3 py-1.5 rounded-xl text-[10px] font-bold">লিঙ্ক</a>
                                        <button onclick="window.openProofBox('${d.id}', '${job.title}')" class="bg-blue-600 text-white px-3 py-1.5 rounded-xl text-[10px] font-bold underline">প্রমাণ জমা দিন</button>
                                    </div>
                                </div>
                            </div>`;
                    }
                });
            });
        };

        // --- Firebase Listeners ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('auth-view').classList.add('hidden');
                document.getElementById('main-view').classList.remove('hidden');
                document.getElementById('bottom-nav').classList.remove('hidden');
                document.getElementById('user-email-display').innerText = user.email;
                document.getElementById('prof-email-display').innerText = user.email;
                loadJobs();

                onSnapshot(doc(db, "users", user.uid), (s) => {
                    if(s.exists()){
                        const d = s.data();
                        document.getElementById('balance').innerText = d.balance.toFixed(2);
                        document.getElementById('nav-balance').innerText = d.balance.toFixed(2);
                        document.getElementById('stat-balance').innerText = "৳" + d.balance.toFixed(2);
                        document.getElementById('stat-refers').innerText = d.totalRefers || 0;
                        document.getElementById('account-status').innerText = d.isActive ? "Active" : "Not Active";
                        document.getElementById('account-status').className = d.isActive ? "text-[9px] font-bold mt-1 px-2 py-0.5 bg-green-500 rounded-full inline-block" : "text-[9px] font-bold mt-1 px-2 py-0.5 bg-red-500 rounded-full inline-block";
                    }
                });
            } else {
                document.getElementById('auth-view').classList.remove('hidden');
                document.getElementById('main-view').classList.add('hidden');
            }
        });

        // Auth Actions
        document.getElementById('login-btn').onclick = () => {
            signInWithEmailAndPassword(auth, document.getElementById('email').value.trim(), document.getElementById('password').value).catch(e => alert(e.message));
        };

        document.getElementById('signup-btn').onclick = () => {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value;
            createUserWithEmailAndPassword(auth, email, pass).then(async (c) => {
                await setDoc(doc(db, "users", c.user.uid), { email, balance: 0, isActive: false, totalRefers: 0, createdAt: serverTimestamp() });
            }).catch(e => alert(e.message));
        };

        document.getElementById('logout-btn').onclick = () => signOut(auth).then(() => location.reload());
    </script>
</body>
</html>
