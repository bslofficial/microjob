<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MicroJobs BD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .active-tab { color: #2563eb !important; font-weight: bold; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        #side-menu { transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-slate-50 pb-24 overflow-x-hidden">

    <header class="bg-blue-600 text-white p-4 shadow-lg sticky top-0 z-50 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <button onclick="window.toggleMenu()" class="text-xl"><i class="fas fa-bars"></i></button>
            <h1 class="font-bold text-lg">MicroJobs BD</h1>
        </div>
        <div class="flex items-center gap-2">
            <span class="text-[10px] bg-blue-500 px-2 py-1 rounded-lg">৳<span id="nav-balance">0.00</span></span>
            <button onclick="window.switchTab('profile')" class="w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center border border-blue-400">
                <i class="fas fa-user text-xs"></i>
            </button>
        </div>
    </header>

    <div id="side-menu" class="fixed inset-y-0 left-0 w-64 bg-white shadow-2xl z-[60] transform -translate-x-full">
        <div class="p-6 bg-blue-600 text-white">
            <div class="w-14 h-14 bg-white/20 rounded-full flex items-center justify-center text-xl mb-3"><i class="fas fa-user-circle"></i></div>
            <p id="user-email-display" class="text-xs truncate font-bold">স্বাগতম!</p>
            <p id="account-status" class="text-[9px] font-bold mt-1 px-2 py-0.5 bg-red-500 rounded-full inline-block">Not Active</p>
        </div>
        <nav class="p-4 space-y-1 text-gray-700">
            <button onclick="window.switchTab('home')" class="w-full text-left p-3 hover:bg-blue-50 rounded-xl flex items-center gap-3 text-sm"><i class="fas fa-home w-5"></i> Home</button>
            <button onclick="window.switchTab('leaderboard')" class="w-full text-left p-3 hover:bg-blue-50 rounded-xl flex items-center gap-3 text-sm"><i class="fas fa-trophy w-5 text-yellow-500"></i> Leaderboard</button>
            <button onclick="window.switchTab('wallet')" class="w-full text-left p-3 hover:bg-blue-50 rounded-xl flex items-center gap-3 text-sm"><i class="fas fa-wallet w-5"></i> Wallet</button>
            <button onclick="window.switchTab('refer')" class="w-full text-left p-3 hover:bg-blue-50 rounded-xl flex items-center gap-3 text-sm"><i class="fas fa-gift w-5"></i> Refer & Earn</button>
            <hr class="my-2">
            <button id="logout-btn" class="w-full text-left p-3 text-red-500 font-bold hover:bg-red-50 rounded-xl flex items-center gap-3 text-sm"><i class="fas fa-sign-out-alt w-5"></i> Logout</button>
        </nav>
    </div>
    <div id="menu-overlay" onclick="window.toggleMenu()" class="fixed inset-0 bg-black/50 hidden z-[55]"></div>

    <main class="max-w-md mx-auto p-4">
        <div id="auth-view" class="bg-white p-8 rounded-3xl shadow-xl mt-10">
            <h2 class="text-xl font-bold mb-6 text-center text-blue-600">Login / Signup</h2>
            <input id="email" type="email" placeholder="ইমেইল" class="w-full border p-4 rounded-2xl mb-3 outline-none bg-gray-50 focus:border-blue-500 text-sm">
            <input id="password" type="password" placeholder="পাসওয়ার্ড" class="w-full border p-4 rounded-2xl mb-5 outline-none bg-gray-50 focus:border-blue-500 text-sm">
            <button id="login-btn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold mb-3 text-sm">Login</button>
            <button id="signup-btn" class="w-full text-blue-600 font-bold py-2 text-sm">Create Account</button>
        </div>

        <div id="main-view" class="hidden">
            <div id="home-tab" class="tab-content active">
                <div class="bg-gradient-to-br from-blue-600 to-blue-800 p-6 rounded-3xl text-white shadow-xl mb-6">
                    <p class="opacity-80 text-[10px] font-bold uppercase">ব্যালেন্স</p>
                    <h2 class="text-4xl font-extrabold mt-1">৳<span id="balance">0.00</span></h2>
                </div>
                <div id="job-list" class="space-y-4"></div>
            </div>

            <div id="leaderboard-tab" class="tab-content">
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2"><i class="fas fa-trophy text-yellow-500"></i> সেরা ১০ উপার্জনকারী</h2>
                <div id="leader-list" class="bg-white rounded-3xl shadow-sm border overflow-hidden divide-y"></div>
            </div>

            <div id="wallet-tab" class="tab-content space-y-4">
                <div class="bg-white p-5 rounded-3xl shadow-sm border border-orange-100">
                    <h2 class="font-bold text-orange-600 text-sm mb-3">উইথড্র রিকোয়েস্ট (বিকাশ/নগদ)</h2>
                    <input id="w-amount" type="number" placeholder="৳৫০+" class="w-full p-3 bg-gray-50 rounded-xl mb-2 text-sm outline-none border">
                    <input id="w-number" type="text" placeholder="নম্বর লিখুন" class="w-full p-3 bg-gray-50 rounded-xl mb-3 text-sm outline-none border">
                    <button id="withdraw-btn" class="w-full bg-orange-600 text-white py-3 rounded-xl font-bold text-sm">উইথড্র দিন</button>
                </div>
                <h3 class="font-bold text-sm px-1">পেমেন্ট হিস্ট্রি</h3>
                <div id="history-list" class="space-y-2"></div>
            </div>

            <div id="refer-tab" class="tab-content">
                <div class="bg-white p-6 rounded-3xl shadow-md text-center border">
                    <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center text-2xl mx-auto mb-4"><i class="fas fa-gift"></i></div>
                    <h2 class="text-xl font-bold">রেফার করে আয়!</h2>
                    <p class="text-xs text-gray-500 mt-2">প্রতি সফল রেফারে পাবেন বোনাস</p>
                    <div class="mt-6 p-4 bg-gray-50 rounded-2xl border-dashed border-2 border-blue-100 overflow-hidden">
                        <p id="refer-link" class="text-blue-600 font-bold text-xs truncate">লোড হচ্ছে...</p>
                    </div>
                    <button onclick="window.copyReferLink()" class="w-full bg-blue-600 text-white py-3 rounded-2xl mt-4 font-bold">কপি লিঙ্ক</button>
                </div>
            </div>

            <div id="profile-tab" class="tab-content space-y-4">
                <div class="bg-white p-6 rounded-3xl shadow-sm text-center border">
                    <div class="w-20 h-20 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-3xl mx-auto mb-3">
                        <i class="fas fa-user"></i>
                    </div>
                    <h2 class="font-bold text-gray-800" id="prof-email-display">User Email</h2>
                    <button onclick="window.activateAccount()" id="activate-btn-prof" class="mt-3 px-4 py-1.5 bg-red-100 text-red-600 text-[10px] font-bold rounded-full uppercase tracking-wider">Activate Now (৳১০০)</button>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-white p-4 rounded-2xl border text-center shadow-sm">
                        <p class="text-[9px] text-gray-400 uppercase">মোট রেফার</p>
                        <h4 id="stat-refers" class="text-xl font-bold text-blue-600">0</h4>
                    </div>
                    <div class="bg-white p-4 rounded-2xl border text-center shadow-sm">
                        <p class="text-[9px] text-gray-400 uppercase">উইথড্র</p>
                        <h4 id="stat-withdraws" class="text-xl font-bold text-orange-600">৳০</h4>
                    </div>
                </div>
                <button id="logout-btn-2" class="w-full p-4 bg-white rounded-2xl border text-red-500 font-bold text-sm shadow-sm flex items-center justify-center gap-2"><i class="fas fa-sign-out-alt"></i> লগআউট</button>
            </div>
        </div>
    </main>

    <nav id="bottom-nav" class="hidden fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around py-3 z-50">
        <button onclick="window.switchTab('home')" id="btn-home" class="flex flex-col items-center active-tab">
            <i class="fas fa-home"></i><span class="text-[9px] mt-1">Home</span>
        </button>
        <button onclick="window.switchTab('leaderboard')" id="btn-leaderboard" class="flex flex-col items-center text-gray-400">
            <i class="fas fa-trophy"></i><span class="text-[9px] mt-1">Top 10</span>
        </button>
        <button onclick="window.switchTab('wallet')" id="btn-wallet" class="flex flex-col items-center text-gray-400">
            <i class="fas fa-wallet"></i><span class="text-[9px] mt-1">Wallet</span>
        </button>
        <button onclick="window.switchTab('profile')" id="btn-profile" class="flex flex-col items-center text-gray-400">
            <i class="fas fa-user"></i><span class="text-[9px] mt-1">Profile</span>
        </button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, query, orderBy, limit, setDoc, getDoc, updateDoc, addDoc, serverTimestamp, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyANRqR887AfhoW4GxInZHH9J3YYWCfnjs0",
            authDomain: "microjobs-b9d90.firebaseapp.com",
            projectId: "microjobs-b9d90",
            storageBucket: "microjobs-b9d90.firebasestorage.app",
            messagingSenderId: "1006928193385",
            appId: "1:1006928193385:web:d4b5cc1911abda6ff53ff8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // --- UI Functions ---
        window.toggleMenu = () => {
            const menu = document.getElementById('side-menu');
            const overlay = document.getElementById('menu-overlay');
            const isOpen = menu.style.transform === 'translateX(0px)';
            menu.style.transform = isOpen ? 'translateX(-100%)' : 'translateX(0px)';
            overlay.classList.toggle('hidden');
        };

        window.switchTab = (tab) => {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(tab + '-tab').classList.add('active');
            document.querySelectorAll('#bottom-nav button').forEach(el => {
                el.classList.remove('active-tab');
                el.classList.add('text-gray-400');
            });
            const btn = document.getElementById('btn-' + tab);
            if(btn) { btn.classList.add('active-tab'); btn.classList.remove('text-gray-400'); }
            if(tab === 'leaderboard') loadLeaderboard();
            if(document.getElementById('side-menu').style.transform === 'translateX(0px)') window.toggleMenu();
        };

        // --- Data Loading ---
        const loadJobs = () => {
            onSnapshot(collection(db, "jobs"), (snap) => {
                const container = document.getElementById('job-list');
                container.innerHTML = "";
                snap.forEach(d => {
                    const job = d.data();
                    if(job.status === "active") {
                        container.innerHTML += `
                            <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 mb-3">
                                <h3 class="font-bold text-sm text-gray-800">${job.title}</h3>
                                <div class="flex justify-between items-center mt-3">
                                    <p class="text-[11px] text-blue-600 font-bold">পুরস্কার: ৳${job.budget}</p>
                                    <a href="${job.url}" target="_blank" class="bg-blue-600 text-white px-4 py-1.5 rounded-xl text-[10px] font-bold">কাজ শুরু করুন</a>
                                </div>
                            </div>`;
                    }
                });
            });
        };

        const loadLeaderboard = () => {
            const q = query(collection(db, "users"), orderBy("balance", "desc"), limit(10));
            onSnapshot(q, (snap) => {
                const list = document.getElementById('leader-list');
                list.innerHTML = "";
                let i = 1;
                snap.forEach(d => {
                    const u = d.data();
                    list.innerHTML += `
                        <div class="p-4 flex justify-between items-center text-xs">
                            <span class="font-medium text-gray-500">${i++}. ${u.email.split('@')[0]}</span>
                            <span class="font-bold text-blue-600">৳${u.balance.toFixed(2)}</span>
                        </div>`;
                });
            });
        };

        const loadHistory = (uid) => {
            const q = query(collection(db, "withdraws"), orderBy("createdAt", "desc"));
            onSnapshot(q, (snap) => {
                const list = document.getElementById('history-list');
                list.innerHTML = "";
                snap.forEach(d => {
                    const w = d.data();
                    if(w.uid === uid) {
                        list.innerHTML += `
                            <div class="bg-white p-3 rounded-2xl border flex justify-between items-center text-[10px]">
                                <div><p class="font-bold">৳${w.amount}</p><p class="text-gray-400">${w.number}</p></div>
                                <span class="px-2 py-1 rounded bg-blue-50 text-blue-600 font-bold uppercase">${w.status}</span>
                            </div>`;
                    }
                });
            });
        };

        // --- Auth Listener ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-view').classList.add('hidden');
                document.getElementById('main-view').classList.remove('hidden');
                document.getElementById('bottom-nav').classList.remove('hidden');
                document.getElementById('user-email-display').innerText = user.email;
                document.getElementById('prof-email-display').innerText = user.email;
                document.getElementById('refer-link').innerText = `${window.location.origin}${window.location.pathname}?ref=${user.uid}`;
                
                loadJobs();
                loadHistory(user.uid);

                onSnapshot(doc(db, "users", user.uid), (s) => {
                    if(s.exists()){
                        const d = s.data();
                        document.getElementById('balance').innerText = d.balance.toFixed(2);
                        document.getElementById('nav-balance').innerText = d.balance.toFixed(2);
                        document.getElementById('stat-refers').innerText = d.totalRefers || 0;
                        document.getElementById('account-status').innerText = d.isActive ? "Active" : "Not Active";
                        document.getElementById('account-status').className = d.isActive ? "text-[9px] font-bold mt-1 px-2 py-0.5 bg-green-500 rounded-full inline-block" : "text-[9px] font-bold mt-1 px-2 py-0.5 bg-red-500 rounded-full inline-block";
                    }
                });
            } else {
                document.getElementById('auth-view').classList.remove('hidden');
                document.getElementById('main-view').classList.add('hidden');
                document.getElementById('bottom-nav').classList.add('hidden');
            }
        });

        // --- Button Actions ---
        document.getElementById('login-btn').onclick = () => {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value;
            signInWithEmailAndPassword(auth, email, pass).catch(e => alert(e.message));
        };

        document.getElementById('signup-btn').onclick = () => {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value;
            const ref = new URLSearchParams(window.location.search).get('ref');
            createUserWithEmailAndPassword(auth, email, pass).then(async (cred) => {
                await setDoc(doc(db, "users", cred.user.uid), {
                    email, balance: 0, isActive: false, referredBy: ref || null, totalRefers: 0, createdAt: serverTimestamp()
                });
            }).catch(e => alert(e.message));
        };

        document.getElementById('withdraw-btn').onclick = async () => {
            const amount = Number(document.getElementById('w-amount').value);
            const number = document.getElementById('w-number').value.trim();
            if(amount < 50 || !number) return alert("তথ্য সঠিক দিন");
            
            const userRef = doc(db, "users", auth.currentUser.uid);
            const userSnap = await getDoc(userRef);
            if(userSnap.data().balance >= amount) {
                await addDoc(collection(db, "withdraws"), {
                    uid: auth.currentUser.uid, amount, number, status: "pending", createdAt: serverTimestamp()
                });
                await updateDoc(userRef, { balance: increment(-amount) });
                alert("রিকোয়েস্ট পাঠানো হয়েছে!");
            } else { alert("পর্যাপ্ত ব্যালেন্স নেই"); }
        };

        window.copyReferLink = () => {
            navigator.clipboard.writeText(document.getElementById('refer-link').innerText);
            alert("লিঙ্ক কপি হয়েছে!");
        };

        document.getElementById('logout-btn').onclick = () => signOut(auth).then(() => location.reload());
        document.getElementById('logout-btn-2').onclick = () => signOut(auth).then(() => location.reload());

    </script>
</body>
</html>
