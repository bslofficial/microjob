<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MicroJobs BD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .active-tab { color: #2563eb !important; font-weight: bold; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        #side-menu { transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-slate-50 pb-24 overflow-x-hidden">

    <header class="bg-blue-600 text-white p-4 shadow-lg sticky top-0 z-50 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <button onclick="window.toggleMenu()" class="text-xl"><i class="fas fa-bars"></i></button>
            <h1 class="font-bold text-lg">MicroJobs BD</h1>
        </div>
        <div class="bg-blue-500 px-2 py-1 rounded-lg text-[10px]">৳<span id="nav-balance">0.00</span></div>
    </header>

    <div id="side-menu" class="fixed inset-y-0 left-0 w-64 bg-white shadow-2xl z-[60] transform -translate-x-full">
        <div class="p-4 border-b"><h2 class="text-sm font-bold text-gray-800">মেনু বার</h2></div>
        <nav class="p-4 space-y-1">
            <button onclick="window.switchTab('home')" class="w-full text-left p-3 hover:bg-blue-50 rounded-xl flex items-center gap-3 text-sm"><i class="fas fa-home"></i> Home</button>
            <button onclick="window.switchTab('leaderboard')" class="w-full text-left p-3 hover:bg-blue-50 rounded-xl flex items-center gap-3 text-sm"><i class="fas fa-trophy text-yellow-500"></i> Leaderboard</button>
            <button onclick="window.switchTab('wallet')" class="w-full text-left p-3 hover:bg-blue-50 rounded-xl flex items-center gap-3 text-sm"><i class="fas fa-wallet"></i> Wallet</button>
            <hr class="my-2">
            <button id="logout-btn" class="w-full text-left p-3 text-red-500 font-bold flex items-center gap-3 text-sm"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </nav>
    </div>
    <div id="menu-overlay" onclick="window.toggleMenu()" class="fixed inset-0 bg-black/50 hidden z-[55]"></div>

    <main class="max-w-md mx-auto p-4">
        <div id="auth-view" class="bg-white p-8 rounded-3xl shadow-xl mt-10">
            <h2 class="text-xl font-bold mb-6 text-center text-blue-600">Login / Signup</h2>
            <input id="email" type="email" placeholder="ইমেইল" class="w-full border p-4 rounded-2xl mb-3 outline-none">
            <input id="password" type="password" placeholder="পাসওয়ার্ড" class="w-full border p-4 rounded-2xl mb-5 outline-none">
            <button id="login-btn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold mb-3">Login</button>
            <button id="signup-btn" class="w-full text-blue-600 font-bold py-2 text-sm">Create Account</button>
        </div>

        <div id="main-view" class="hidden">
            <div id="home-tab" class="tab-content active">
                <div class="bg-gradient-to-br from-blue-600 to-blue-800 p-6 rounded-3xl text-white shadow-xl mb-6 text-center">
                    <p class="opacity-80 text-[10px]">ব্যালেন্স</p>
                    <h2 class="text-4xl font-extrabold">৳<span id="balance">0.00</span></h2>
                </div>
                <div id="job-list" class="space-y-4"></div>
            </div>

            <div id="leaderboard-tab" class="tab-content">
                <h2 class="text-lg font-bold mb-4">সেরা ১০ উপার্জনকারী</h2>
                <div id="leader-list" class="bg-white rounded-2xl border shadow-sm divide-y"></div>
            </div>

            <div id="wallet-tab" class="tab-content">
                <div class="bg-white p-5 rounded-2xl border mb-6">
                    <h2 class="font-bold text-sm mb-4">টাকা উত্তোলন</h2>
                    <input id="w-amount" type="number" placeholder="৳৫০+" class="w-full p-3 border rounded-xl mb-2 text-sm">
                    <input id="w-number" type="text" placeholder="নম্বর লিখুন" class="w-full p-3 border rounded-xl mb-4 text-sm">
                    <button id="withdraw-btn" class="w-full bg-orange-600 text-white py-3 rounded-xl font-bold">উইথড্র</button>
                </div>
                <h3 class="font-bold text-sm mb-3">পেমেন্ট হিস্ট্রি</h3>
                <div id="history-list" class="space-y-2"></div>
            </div>
        </div>
    </main>

    <nav id="bottom-nav" class="hidden fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around py-3 z-50">
        <button onclick="window.switchTab('home')" id="btn-home" class="flex flex-col items-center active-tab"><i class="fas fa-home"></i><span class="text-[9px]">Home</span></button>
        <button onclick="window.switchTab('leaderboard')" id="btn-leaderboard" class="flex flex-col items-center text-gray-400"><i class="fas fa-trophy"></i><span class="text-[10px]">Top 10</span></button>
        <button onclick="window.switchTab('wallet')" id="btn-wallet" class="flex flex-col items-center text-gray-400"><i class="fas fa-wallet"></i><span class="text-[10px]">Wallet</span></button>
    </nav>

    <script type="module" src="app.js"></script>
</body>
</html>
