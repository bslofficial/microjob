<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MicroJobs BD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-tab { color: #2563eb !important; font-weight: 800; }
        #bottom-nav { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="bg-slate-50 pb-24">

    <header class="bg-blue-600 text-white p-4 shadow-lg sticky top-0 z-40">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="font-bold text-lg">MicroJobs BD</h1>
            <button id="logout-btn" class="hidden bg-red-500 px-3 py-1 rounded text-xs font-bold shadow">Logout</button>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4">
        <div id="auth-view" class="bg-white p-8 rounded-3xl shadow-xl mt-10">
            <h2 class="text-xl font-bold mb-6 text-center text-gray-800">লগইন / সাইন-আপ</h2>
            <input id="email" type="email" placeholder="ইমেইল" class="w-full border p-4 rounded-2xl mb-3 outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50">
            <input id="password" type="password" placeholder="পাসওয়ার্ড" class="w-full border p-4 rounded-2xl mb-5 outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50">
            <button id="login-btn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-200">Login</button>
            <button id="signup-btn" class="w-full text-blue-600 font-bold py-3 mt-2">Create Account</button>
        </div>

        <div id="main-view" class="hidden">
            <div id="home-tab">
                <div class="bg-gradient-to-r from-blue-600 to-blue-500 p-6 rounded-3xl text-white shadow-xl mb-6">
                    <p class="opacity-80 text-xs">বর্তমান ব্যালেন্স</p>
                    <h2 class="text-4xl font-extrabold mt-1">৳<span id="balance">0.00</span></h2>
                </div>
                <div id="job-list" class="grid gap-4"></div>
            </div>

            <div id="profile-tab" class="hidden space-y-4">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                    <h2 class="text-lg font-bold mb-4 text-blue-800">আপনার তথ্য</h2>
                    <p class="text-sm text-gray-500">ইমেইল: <span id="user-email" class="font-bold text-gray-700"></span></p>
                    <p class="text-sm text-gray-500 mt-2">মোট আর্নিং: <span class="text-green-600 font-bold text-lg">৳<span id="p-balance">0.00</span></span></p>
                </div>
            </div>

            <div id="wallet-tab" class="hidden">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                    <h2 class="text-xl font-bold mb-2 text-orange-600">টাকা উত্তোলন</h2>
                    <p class="text-xs text-gray-400 mb-6">উইথড্র রিকোয়েস্ট পাঠান</p>
                    <input id="w-amount" type="number" placeholder="পরিমাণ (৳)" class="w-full border p-4 rounded-2xl mb-3 outline-none bg-gray-50">
                    <input id="w-number" type="text" placeholder="বিকাশ/নগদ নম্বর" class="w-full border p-4 rounded-2xl mb-4 outline-none bg-gray-50">
                    <button id="withdraw-btn" class="w-full bg-orange-500 text-white py-4 rounded-2xl font-bold shadow-lg shadow-orange-100">রিকোয়েস্ট পাঠান</button>
                </div>
            </div>
        </div>
    </main>

    <div id="bottom-nav" class="hidden fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around py-4 shadow-[0_-5px_15px_rgba(0,0,0,0.05)] z-50">
        <button onclick="switchTab('home')" id="btn-home" class="flex flex-col items-center active-tab">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
            <span class="text-[10px] font-bold">Home</span>
        </button>
        <button onclick="switchTab('profile')" id="btn-profile" class="flex flex-col items-center text-gray-300">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            <span class="text-[10px] font-bold">Profile</span>
        </button>
        <button onclick="switchTab('wallet')" id="btn-wallet" class="flex flex-col items-center text-gray-300">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg>
            <span class="text-[10px] font-bold">Wallet</span>
        </button>
    </div>

    <div id="proof-modal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center p-6 z-[60] backdrop-blur-sm">
        <div class="bg-white p-6 rounded-3xl max-w-sm w-full shadow-2xl">
            <h3 class="font-bold text-lg mb-1">কাজের প্রমাণ</h3>
            <p id="modal-job-title" class="text-xs text-blue-600 mb-5 font-bold"></p>
            <input type="file" id="imageInput" accept="image/*" class="w-full text-xs text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-50 file:text-blue-700 mb-6">
            <div class="flex gap-2">
                <button onclick="document.getElementById('proof-modal').classList.add('hidden')" class="flex-1 bg-gray-100 py-3 rounded-2xl font-bold text-gray-500">বাতিল</button>
                <button id="submit-proof-btn" class="flex-1 bg-blue-600 text-white py-3 rounded-2xl font-bold shadow-lg">জমা দিন</button>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
